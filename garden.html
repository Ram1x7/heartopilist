<!-- Firebase FCM（module） -->
<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getMessaging, getToken, onMessage }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB6aGH4BCn2NFNUMeon9LTM_ck2vKoWYFI",
  authDomain: "heartopilist-c8b69.firebaseapp.com",
  projectId: "heartopilist-c8b69",
  storageBucket: "heartopilist-c8b69.firebasestorage.app",
  messagingSenderId: "906963149499",
  appId: "1:906963149499:web:14ab2b1bd7c079f616bf9e",
};

const VAPID_KEY = "BHsuetgZxjPnNS1eiqkIRwmFhddZkN0FweRiAbwCv3ixBEnTODksIpyOoHi72HLtOLYdYZ9xno-K1RJE93247LQ";
const REGISTER_URL = "https://registertimer-e67djhnlrq-uc.a.run.app";
const CANCEL_URL   = "https://canceltimer-e67djhnlrq-uc.a.run.app";

const app = initializeApp(FIREBASE_CONFIG);
const messaging = getMessaging(app);

// FCMトークン取得
async function getFCMToken() {
  try {
    const sw = await navigator.serviceWorker.register("./firebase-messaging-sw.js");
    const token = await getToken(messaging, {
      vapidKey: VAPID_KEY,
      serviceWorkerRegistration: sw,
    });
    if(token){
      localStorage.setItem("fcmToken", token);
      return token;
    }
  } catch(e) {
    console.error("FCMトークン取得失敗:", e);
  }
  return null;
}

// 通知許可を要求
window.requestNotifPermission = async function() {
  const permission = await Notification.requestPermission();
  if(permission === "granted"){
    const token = await getFCMToken();
    if(token){
      document.getElementById("notifBanner").style.display = "none";
      showToast("通知が有効になりました！");
    }
  } else {
    showToast("通知が拒否されました");
  }
};

// フォアグラウンド通知
onMessage(messaging, (payload) => {
  showToast(payload.notification?.title || "通知が届きました");
});

// 通知をCloud Functionsに登録
window.registerNotification = async function(item, mode) {
  const token = localStorage.getItem("fcmToken") || await getFCMToken();
  if(!token){
    showToast("先に通知を許可してください");
    return;
  }

  const now = Date.now();
  const growMs = item.growTime * 60 * 1000;
  let notifyTimes = [];

  if(mode === "normal"){
    notifyTimes = [{ label:"harvest", time: now + growMs }];
  } else if(mode === "weed"){
    const third = Math.floor(growMs / 3);
    notifyTimes = [
      { label:"草抜き1回目", time: now + third },
      { label:"草抜き2回目", time: now + third * 2 },
      { label:"草抜き3回目", time: now + growMs - 60000 },
      { label:"harvest",    time: now + growMs },
    ];
  }

  try {
    const res = await fetch(REGISTER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fcmToken: token, cropName: item.name, mode, notifyTimes }),
    });

    if(res.ok){
      const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
      timers[item.name + "_" + mode] = { end: now + growMs, mode };
      localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
      showToast(`通知をセットしました（${formatTime(item.growTime)}後）`);
      renderModal(window.currentItem);
      renderContent();
    } else {
      showToast("通知のセットに失敗しました");
    }
  } catch(e) {
    console.error(e);
    showToast("通知のセットに失敗しました");
  }
};

// 通知をキャンセル
window.cancelNotification = async function(item, mode) {
  const token = localStorage.getItem("fcmToken");
  if(token){
    try {
      await fetch(CANCEL_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fcmToken: token, cropName: item.name }),
      });
    } catch(e) { console.error(e); }
  }

  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  delete timers[item.name + "_" + mode];
  localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
  showToast("通知をキャンセルしました");
  renderModal(window.currentItem);
  renderContent();
};

// 起動時にトークンを確認
(async () => {
  if(Notification.permission === "granted"){
    await getFCMToken();
    document.getElementById("notifBanner").style.display = "none";
  } else if(Notification.permission === "default"){
    document.getElementById("notifBanner").style.display = "block";
  }
})();
</script>

<!-- メインロジック -->
<script>
// ── ダークモード ──
const darkToggle = document.getElementById("darkToggle");
const savedDark = localStorage.getItem("darkMode");
if(savedDark === "true") document.body.classList.add("dark");
else if(savedDark === null && window.matchMedia("(prefers-color-scheme: dark)").matches)
  document.body.classList.add("dark");

function updateDarkBtn(){
  darkToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
}
updateDarkBtn();
darkToggle.onclick = ()=>{
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
  updateDarkBtn();
};

// ── 認証データ（index.htmlと共有） ──
let authData = JSON.parse(localStorage.getItem("authData") || "{}");

function toggleAuth(name){
  authData[name] = !authData[name];
  localStorage.setItem("authData", JSON.stringify(authData));
  renderContent();
  if(window.currentItem){
    try{ renderModal(window.currentItem); }
    catch(e){ console.error(e); }
  }
}

// ── 通知タイマー ──
function isNotifSet(item, mode){
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  const t = timers[item.name + "_" + mode];
  if(!t) return false;
  return t.end > Date.now();
}

function getRemaining(item, mode){
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  const t = timers[item.name + "_" + mode];
  if(!t) return null;
  const ms = t.end - Date.now();
  if(ms <= 0) return null;
  return formatTime(Math.ceil(ms / 60000));
}

function cleanExpiredTimers(){
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  const now = Date.now();
  Object.keys(timers).forEach(k => {
    if(timers[k].end <= now) delete timers[k];
  });
  localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
}

// ── 時間フォーマット ──
function formatTime(min){
  if(min < 60) return `${min}分`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  if(m === 0) return `${h}時間`;
  return `${h}時間${m}分`;
}

// ── タブ ──
let currentTab = "crop";
window.currentItem = null;

function setTab(tab){
  currentTab = tab;
  ["crop","flower"].forEach(t=>{
    document.getElementById("tab-"+t).classList.toggle("active", t === tab);
  });
  renderContent();
}

// ── グリッド描画 ──
function renderContent(){
  const el = document.getElementById("gardenContent");
  el.innerHTML = "";

  if(currentTab === "crop"){
    el.appendChild(renderSection("通常作物", cropData.filter(c=>!c.isEvent)));
    const ev = cropData.filter(c=>c.isEvent);
    if(ev.length) el.appendChild(renderSection("イベント作物", ev, true));
  } else {
    el.appendChild(renderSection("通常の花", flowerData.filter(f=>!f.isEvent)));
    const ev = flowerData.filter(f=>f.isEvent);
    if(ev.length) el.appendChild(renderSection("イベントの花", ev, true));
  }
}

function renderSection(label, items, isEvent=false){
  const wrap = document.createElement("div");

  const lbl = document.createElement("div");
  lbl.className = "section-label";
  lbl.textContent = label;
  wrap.appendChild(lbl);

  if(isEvent){
    const banner = document.createElement("div");
    banner.className = "event-ended-banner";
    banner.textContent = "⚠️ 現在このイベントは終了しています";
    wrap.appendChild(banner);
  }

  const grid = document.createElement("div");
  grid.className = "garden-grid";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "garden-item";

    const hasNotif = isNotifSet(item,"normal") || isNotifSet(item,"weed");
    const isAuthed = item.auth !== false && !!authData[item.name];

    div.innerHTML = `
      <div class="img-wrap">
        <div class="level-badge">Lv.${item.level}</div>
        ${hasNotif ? '<div class="notif-icon">🔔</div>' : ''}
        ${item.auth !== false ? `
          <button class="auth-btn ${isAuthed ? "checked" : ""}"
            onclick="event.stopPropagation(); toggleAuth('${item.name}')">
            ${isAuthed ? "🎖" : ""}
          </button>
        ` : ''}
        <img src="${item.img}" alt="${item.name}" loading="lazy">
      </div>
      <div class="item-name">${item.name}</div>
      <div style="font-size:9px; color:var(--text-sub); text-align:center; margin-top:2px;">
        ${formatTime(item.growTime)}
      </div>
    `;

    div.onclick = () => openModal(item);
    grid.appendChild(div);
  });

  wrap.appendChild(grid);
  return wrap;
}

// ── モーダル ──
function openModal(item){
  window.currentItem = item;
  renderModal(item);
  document.getElementById("detailModal").style.display = "block";
}

function closeModal(){
  document.getElementById("detailModal").style.display = "none";
  window.currentItem = null;
}

function renderModal(item){
  const isFlower = currentTab === "flower";
  const box = document.getElementById("modalBox");

  // 売価テーブル
  const stars = ["☆1","☆2","☆3","☆4","☆5"];
  const priceRows = stars.map((s,i) => {
    const p = item.prices[i];
    return `<tr>
      <td>${s}</td>
      <td>${p !== null ? p.toLocaleString() : '<span class="price-null">未確認</span>'}</td>
    </tr>`;
  }).join("");

  // 交配（花のみ）
  let breedingHTML = "";
  if(isFlower && item.colors && item.colors.length > 0){
    const chips = item.colors.map(c => {
      const r = colorRarity[c] || 1;
      return `<span class="breeding-chip rarity-${r}">${c}</span>`;
    }).join("");

    const examples = [
      { from:["赤","黄","白"], to:"オレンジまたはピンク", rFrom:1, rTo:2 },
      { from:["オレンジ","ピンク"], to:"黒または桃", rFrom:2, rTo:3 },
      { from:["黒","桃"], to:"紫・青・緑", rFrom:3, rTo:4 },
      { from:["紫","青","緑"], to:"輝くまたは夜光", rFrom:4, rTo:5 },
    ].filter(ex =>
      ex.from.some(f => item.colors.includes(f)) &&
      item.colors.some(c => colorRarity[c] === ex.rTo)
    ).map(ex => `
      <div class="breeding-combo">
        <span class="breeding-chip rarity-${ex.rFrom}">
          ${ex.from.filter(f => item.colors.includes(f)).join(" / ")}
        </span>
        <span class="breeding-combo-arrow">×2 →</span>
        <span class="breeding-chip rarity-${ex.rTo}">${ex.to}</span>
      </div>
    `).join("");

    breedingHTML = `
      <div style="margin-bottom:12px;">
        <div class="section-title">🌸 交配で作れる色</div>
        <div class="breeding-note">
          毎朝6時に交配が行われます。同じ色を2株並べると上のレア度の種ができます。
        </div>
        <div class="breeding-grid">${chips}</div>
        ${examples ? `
          <div style="font-size:11px; color:var(--text-sub); margin-bottom:6px;">組み合わせ例</div>
          ${examples}
        ` : ""}
      </div>
    `;
  }

  // 通知（作物のみ）
  let notifHTML = "";
  if(!isFlower){
    const normalSet = isNotifSet(item,"normal");
    const weedSet   = isNotifSet(item,"weed");
    const normalRem = getRemaining(item,"normal");
    const weedRem   = getRemaining(item,"weed");

    notifHTML = `
      <div style="margin-bottom:12px;">
        <div class="section-title">🔔 収穫通知</div>
        <div class="notif-btns">
          <button class="notif-btn ${normalSet ? "set" : ""}"
            onclick="${normalSet
              ? `cancelNotification(window.currentItem,'normal')`
              : `registerNotification(window.currentItem,'normal')`}">
            ${normalSet ? "✅ 通常：通知中" : "🔔 通常モード"}
          </button>
          <button class="notif-btn ${weedSet ? "set" : ""}"
            onclick="${weedSet
              ? `cancelNotification(window.currentItem,'weed')`
              : `registerNotification(window.currentItem,'weed')`}">
            ${weedSet ? "✅ 草抜き：通知中" : "🌿 草抜きモード"}
          </button>
        </div>
        <div class="notif-desc">
          通常：収穫タイムにバックグラウンド通知<br>
          草抜き：草抜きタイミング3回＋収穫時に通知
        </div>
        ${normalSet ? `<div class="notif-active-banner">🔔 通常通知中 あと${normalRem}で収穫</div>` : ""}
        ${weedSet   ? `<div class="notif-active-banner">🌿 草抜き通知中 あと${weedRem}で収穫</div>` : ""}
      </div>
    `;
  }

  box.innerHTML = `
    <div class="modal-name">${item.name}</div>
    <div class="modal-imgs">
      <div class="modal-img-wrap">
        <img src="${item.seedImg}" alt="${item.name}の種">
        <div class="modal-img-label">種</div>
      </div>
      <div class="modal-img-wrap">
        <img src="${item.img}" alt="${item.name}">
        <div class="modal-img-label">${isFlower ? "花" : "作物"}</div>
      </div>
    </div>
    <div class="modal-info">
      <div class="garden-info-row">
        <span class="garden-info-label">レベル</span>
        <span class="garden-info-value">Lv.${item.level}</span>
      </div>
      <div class="garden-info-row">
        <span class="garden-info-label">成長時間</span>
        <span class="garden-info-value">${formatTime(item.growTime)}</span>
      </div>
      <div class="garden-info-row">
        <span class="garden-info-label">種の値段</span>
        <span class="garden-info-value">${item.seedPrice.toLocaleString()} コイン</span>
      </div>
      ${!isFlower ? `
      <div class="gardenl-info-row">
        <span class="garden-info-label">草抜き</span>
        <span class="garden-info-value">最大${item.weedCount}回</span>
      </div>` : ""}
      ${item.isEvent ? `
      <div class="garden-info-row">
        <span class="garden-info-label">イベント</span>
        <span class="garden-info-value">${item.eventName}（終了）</span>
      </div>` : ""}
    </div>
    <table class="price-table">
      <tr><th>レア度</th><th>売価</th></tr>
      ${priceRows}
    </table>
    ${breedingHTML}
    ${notifHTML}
    <button class="modal-close-btn" onclick="closeModal()">閉じる</button>
  `;
}

// ── トースト ──
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"), 2500);
}

// 初期化
cleanExpiredTimers();
renderContent();
</script>
</body>
</html>
