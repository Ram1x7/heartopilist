<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB6aGH4BCn2NFNUMeon9LTM_ck2vKoWYFI",
  authDomain: "heartopilist-c8b69.firebaseapp.com",
  projectId: "heartopilist-c8b69",
  storageBucket: "heartopilist-c8b69.firebasestorage.app",
  messagingSenderId: "906963149499",
  appId: "1:906963149499:web:14ab2b1bd7c079f616bf9e",
};

const VAPID_KEY = "BHsuetgZxjPnNS1eiqkIRwmFhddZkN0FweRiAbwCv3ixBEnTODksIpyOoHi72HLtOLYdYZ9xno-K1RJE93247LQ";
const REGISTER_URL = "https://registertimer-e67djhnlrq-uc.a.run.app";
const CANCEL_URL   = "https://canceltimer-e67djhnlrq-uc.a.run.app";

firebase.initializeApp(FIREBASE_CONFIG);
const messaging = firebase.messaging();

async function getFCMToken() {
  try {
    const sw = await navigator.serviceWorker.register("./firebase-messaging-sw.js");
    await navigator.serviceWorker.ready;
    const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: sw });
    if(token){
      localStorage.setItem("fcmToken", token);
      return token;
    }
  } catch(e) {
    console.error("FCMトークン取得失敗:", e);
  }
  return null;
}

async function requestNotifPermission() {
  const permission = await Notification.requestPermission();
  if(permission === "granted"){
    const token = await getFCMToken();
    if(token){
      document.getElementById("notifBanner").style.display = "none";
      showToast("通知が有効になりました！");
    } else {
      showToast("トークン取得に失敗しました");
    }
  } else {
    showToast("通知が拒否されました");
  }
}

document.getElementById("notifAllowBtn").addEventListener("click", requestNotifPermission);

messaging.onMessage((payload) => {
  showToast(payload.notification?.title || "通知が届きました");
});

async function registerNotification(item, mode) {
  const token = localStorage.getItem("fcmToken") || await getFCMToken();
  if(!token){
    showToast("先に通知を許可してください");
    return;
  }

  const now = Date.now();
  const growMs = item.growTime * 60 * 1000;
  let notifyTimes = [];

  if(mode === "normal"){
    notifyTimes = [{ label:"harvest", time: now + growMs }];
  } else if(mode === "weed"){
    const third = Math.floor(growMs / 3);
    notifyTimes = [
      { label:"草抜き1回目", time: now + third },
      { label:"草抜き2回目", time: now + third * 2 },
      { label:"草抜き3回目", time: now + growMs - 90000 },
      { label:"harvest",    time: now + growMs },
    ];
  }

  // ★ 先にlocalStorageを更新してUIを即座に反映
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  timers[item.name + "_" + mode] = { end: now + growMs, mode };
  localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
  showToast(`通知をセットしました（${formatTime(item.growTime)}後）`);
  renderModal(window.currentItem);
  renderContent();

  // APIはバックグラウンドで送信
  try {
    const res = await fetch(REGISTER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fcmToken: token, cropName: item.name, mode, notifyTimes }),
    });
    if(!res.ok){
      delete timers[item.name + "_" + mode];
      localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
      showToast("通知のセットに失敗しました");
      renderModal(window.currentItem);
      renderContent();
    }
  } catch(e) {
    console.error(e);
    delete timers[item.name + "_" + mode];
    localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
    showToast("通知のセットに失敗しました");
    renderModal(window.currentItem);
    renderContent();
  }
}

async function cancelNotification(item, mode) {
  // ★ 先にlocalStorageを更新してUIを即座に反映
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  delete timers[item.name + "_" + mode];
  localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
  showToast("通知をキャンセルしました");
  renderModal(window.currentItem);
  renderContent();

  // APIはバックグラウンドで送信
  const token = localStorage.getItem("fcmToken");
  if(token){
    try {
      await fetch(CANCEL_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fcmToken: token, cropName: item.name }),
      });
    } catch(e) { console.error(e); }
  }
}

(async () => {
  if(Notification.permission === "granted"){
    await getFCMToken();
    document.getElementById("notifBanner").style.display = "none";
  } else if(Notification.permission === "default"){
    document.getElementById("notifBanner").style.display = "block";
  }
})();
</script>

<script>
// ── ダークモード ──
const darkToggle = document.getElementById("darkToggle");
const savedDark = localStorage.getItem("darkMode");
if(savedDark === "true") document.body.classList.add("dark");
else if(savedDark === null && window.matchMedia("(prefers-color-scheme: dark)").matches)
  document.body.classList.add("dark");

function updateDarkBtn(){
  darkToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
}
updateDarkBtn();
darkToggle.onclick = ()=>{
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
  updateDarkBtn();
  forceRepaint();   // ★追加
};

// ★追加：forceRepaint関数自体も追加
function forceRepaint(){
  document.body.style.display = "none";
  document.body.offsetHeight;
  document.body.style.display = "";
}


// ── コンプリート（⭐）データ ──
let checkedData = JSON.parse(localStorage.getItem("garden_checked") || "{}");

function toggleChecked(name){
  checkedData[name] = !checkedData[name];
  localStorage.setItem("garden_checked", JSON.stringify(checkedData));
  renderContent();
}

// ── 認証データ ──
let authData = JSON.parse(localStorage.getItem("authData") || "{}");

function toggleAuth(name){
  authData[name] = !authData[name];
  localStorage.setItem("authData", JSON.stringify(authData));
  renderContent();
}

  // ── 画像プリロード（IntersectionObserver方式） ──
const gardenImgObserver = new IntersectionObserver((entries, obs) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      const item = entry.target._item;
      if(item.seedImg){
        const img = new Image();
        img.src = item.seedImg;
      }
      obs.unobserve(entry.target); // 一度読み込んだら監視解除
    }
  });
}, { rootMargin: "300px" }); // 画面に入る300px手前から先読み開始

// ── 通知タイマー ──
function isNotifSet(item, mode){
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  const t = timers[item.name + "_" + mode];
  if(!t) return false;
  return t.end > Date.now();
}

function getRemainingMs(item, mode){
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  const t = timers[item.name + "_" + mode];
  if(!t) return null;
  const ms = t.end - Date.now();
  return ms > 0 ? ms : null;
}

function cleanExpiredTimers(){
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  const now = Date.now();
  Object.keys(timers).forEach(k => { if(timers[k].end <= now) delete timers[k]; });
  localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
}

// ── 時間フォーマット（分） ──
function formatTime(min){
  if(min < 60) return `${min}分`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  if(m === 0) return `${h}時間`;
  return `${h}時間${m}分`;
}

// ── 時間フォーマット（秒） ──
function formatTimeSeconds(sec){
  if(sec < 60) return `${sec}秒`;
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  if(m < 60) return s > 0 ? `${m}分${s}秒` : `${m}分`;
  const h = Math.floor(m / 60);
  const rm = m % 60;
  if(rm === 0) return s > 0 ? `${h}時間${s}秒` : `${h}時間`;
  return s > 0 ? `${h}時間${rm}分${s}秒` : `${h}時間${rm}分`;
}

// ── タブ ──
let currentTab = "crop";
window.currentItem = null;

function setTab(tab){
  currentTab = tab;
  ["crop","flower"].forEach(t=>{
    document.getElementById("tab-"+t).classList.toggle("active", t === tab);
  });
  renderContent();
}

// ── グリッド描画 ──
function renderContent(){
  const el = document.getElementById("gardenContent");
  el.innerHTML = "";

  if(currentTab === "crop"){
    el.appendChild(renderSection("通常作物", cropData.filter(c=>!c.isEvent)));
    const ev = cropData.filter(c=>c.isEvent);
    if(ev.length) el.appendChild(renderSection("イベント作物", ev, true));
  } else {
    el.appendChild(renderSection("通常の花", flowerData.filter(f=>!f.isEvent)));
    const ev = flowerData.filter(f=>f.isEvent);
    if(ev.length) el.appendChild(renderSection("イベントの花", ev, true));
  }
}

function renderSection(label, items, isEvent=false){
  const wrap = document.createElement("div");

  const lbl = document.createElement("div");
  lbl.className = "section-label";
  lbl.textContent = label;
  wrap.appendChild(lbl);

  if(isEvent){
    const banner = document.createElement("div");
    banner.className = "event-ended-banner";
    banner.textContent = "⚠️ 現在このイベントは終了しています";
    wrap.appendChild(banner);
  }

  const grid = document.createElement("div");
  grid.className = "garden-grid";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "garden-item";

    const hasNotif = !item.isEvent && (isNotifSet(item,"normal") || isNotifSet(item,"weed"));
    const isAuthed = item.auth !== false && !!authData[item.name];
    const isChecked = !!checkedData[item.name];   // ★追加

    div.innerHTML = `
      <div class="img-wrap">
        <div class="level-badge">Lv.${item.level}</div>
        ${hasNotif ? '<div class="notif-badge">🔔</div>' : ''}
        <button class="check-btn ${isChecked ? "checked" : ""}">
          ${isChecked ? "⭐️" : ""}
        </button>
        ${item.auth !== false ? `
          <button class="auth-btn ${isAuthed ? "checked" : ""}">
            ${isAuthed ? "🎖" : ""}
          </button>
        ` : ''}
        <img src="${item.img}" alt="${item.name}" loading="lazy">
      </div>
      <div class="item-name">${item.name}</div>
      <div class="garden-item-sub">${formatTime(item.growTime)}</div>
      ${hasNotif ? `<div class="garden-item-timer" id="timer-${CSS.escape(item.name)}"></div>` : ''}
    `;

    // ★追加：check-btnのクリック処理
    const checkBtn = div.querySelector(".check-btn");
    checkBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleChecked(item.name);
    });

    const authBtn = div.querySelector(".auth-btn");
    if(authBtn){
      authBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleAuth(item.name);
      });
    }
    div._item = item;
    gardenImgObserver.observe(div);   // ★追加
    
    div.onclick = () => openModal(item);
    grid.appendChild(div);
  });


  wrap.appendChild(grid);
  return wrap;
}

// ── モーダル ──
function openModal(item){
  window.currentItem = item;
  renderModal(item);
  document.getElementById("detailModal").style.display = "block";
}

function closeModal(){
  document.getElementById("detailModal").style.display = "none";
  window.currentItem = null;
}

function renderModal(item){
  if(!item) return;
  const isFlower = currentTab === "flower";
  const box = document.getElementById("modalBox");

  const stars = ["☆1","☆2","☆3","☆4","☆5"];
  const priceRows = stars.map((s,i) => {
    const p = item.prices[i];
    return `<tr>
      <td>${s}</td>
      <td>${p !== null ? p.toLocaleString() : '<span class="g-price-null">未確認</span>'}</td>
    </tr>`;
  }).join("");

  let breedingHTML = "";
  if(isFlower && item.colors && item.colors.length > 0){
    const chips = item.colors.map(c => {
      const r = colorRarity[c] || 1;
      return `<span class="breeding-chip rarity-${r}">${c}</span>`;
    }).join("");

    const examples = [
      { from:["赤","黄","白"], to:"オレンジまたはピンク", rFrom:1, rTo:2 },
      { from:["オレンジ","ピンク"], to:"黒または桃", rFrom:2, rTo:3 },
      { from:["黒","桃"], to:"紫・青・緑", rFrom:3, rTo:4 },
      { from:["紫","青","緑"], to:"輝くまたは夜光", rFrom:4, rTo:5 },
    ].filter(ex =>
      ex.from.some(f => item.colors.includes(f)) &&
      item.colors.some(c => colorRarity[c] === ex.rTo)
    ).map(ex => `
      <div class="breeding-combo">
        <span class="breeding-chip rarity-${ex.rFrom}">
          ${ex.from.filter(f => item.colors.includes(f)).join(" / ")}
        </span>
        <span class="breeding-combo-arrow">×2 →</span>
        <span class="breeding-chip rarity-${ex.rTo}">${ex.to}</span>
      </div>
    `).join("");

    breedingHTML = `
      <div style="margin-bottom:12px;">
        <div class="g-section-title">🌸 交配で作れる色</div>
        <div class="breeding-note">毎朝6時に交配が行われます。同じ色を2株並べると上のレア度の種ができます。</div>
        <div class="breeding-grid">${chips}</div>
        ${examples ? `<div style="font-size:11px;color:var(--text-sub);margin-bottom:6px;">組み合わせ例</div>${examples}` : ""}
      </div>
    `;
  }

// 通知（作物のみ・イベント終了済みは除外）
  let notifHTML = "";
  if(!isFlower && !item.isEvent){
    const normalSet = isNotifSet(item,"normal");
    const weedSet   = isNotifSet(item,"weed");

    notifHTML = `
      <div style="margin-bottom:12px;">
        <div class="g-section-title">🔔 収穫通知</div>
        <div class="notif-btns">
          <button class="notif-btn ${normalSet ? "set" : ""}"
            data-action="${normalSet ? "cancel" : "register"}" data-mode="normal">
            ${normalSet ? "✅ 通常：通知中" : "🔔 通常モード"}
          </button>
          <button class="notif-btn ${weedSet ? "set" : ""}"
            data-action="${weedSet ? "cancel" : "register"}" data-mode="weed">
            ${weedSet ? "✅ 草抜き：通知中" : "🌿 草抜きモード"}
          </button>
        </div>
        <div class="notif-desc">
          通常：収穫タイムにバックグラウンド通知<br>
          草抜き：草抜きタイミング3回＋収穫時に通知
        </div>
      </div>
    `;
  }

  box.innerHTML = `
    <div class="g-modal-name">${item.name}</div>
    <div class="g-modal-imgs">
      <div class="g-modal-img-wrap">
        <img src="${item.seedImg}" alt="${item.name}の種">
        <div class="g-modal-img-label">種</div>
      </div>
      <div class="g-modal-img-wrap">
        <img src="${item.img}" alt="${item.name}">
        <div class="g-modal-img-label">${isFlower ? "花" : "作物"}</div>
      </div>
    </div>
    <div class="g-info">
      <div class="g-info-row">
        <span class="g-info-label">レベル</span>
        <span class="g-info-value">Lv.${item.level}</span>
      </div>
      <div class="g-info-row">
        <span class="g-info-label">成長時間</span>
        <span class="g-info-value">${formatTime(item.growTime)}</span>
      </div>
      <div class="g-info-row">
        <span class="g-info-label">種の値段</span>
        <span class="g-info-value">${item.seedPrice.toLocaleString()} コイン</span>
      </div>
      ${!isFlower ? `
      <div class="g-info-row">
        <span class="g-info-label">草抜き</span>
        <span class="g-info-value">最大${item.weedCount}回</span>
      </div>` : ""}
      ${item.isEvent ? `
      <div class="g-info-row">
        <span class="g-info-label">イベント</span>
        <span class="g-info-value">${item.eventName}（終了）</span>
      </div>` : ""}
    </div>
    <table class="g-price-table">
      <tr><th>レア度</th><th>売価</th></tr>
      ${priceRows}
    </table>
    ${breedingHTML}
    ${notifHTML}
    <button class="g-close-btn" onclick="closeModal()">閉じる</button>
  `;

  box.querySelectorAll("[data-action]").forEach(btn => {
    btn.addEventListener("click", () => {
      const action = btn.dataset.action;
      const mode   = btn.dataset.mode;
      if(action === "register") registerNotification(window.currentItem, mode);
      if(action === "cancel")   cancelNotification(window.currentItem, mode);
    });
  });
}

// ── トースト ──
function showToast(msg){
  const t = document.getElementById("gardenToast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"), 2500);
}

// ── ★ 1秒ごとにカード上のタイマーだけ更新 ──
function updateTimers(){
  const allItems = [
    ...(typeof cropData !== "undefined" ? cropData : []),
    ...(typeof flowerData !== "undefined" ? flowerData : []),
  ];

  allItems.forEach(item => {
    const el = document.getElementById("timer-" + CSS.escape(item.name));
    if(!el) return;

    const msNormal = getRemainingMs(item, "normal");
    const msWeed   = getRemainingMs(item, "weed");
    const ms = msNormal !== null ? msNormal : msWeed;

    if(ms !== null){
      const sec = Math.ceil(ms / 1000);
      el.textContent = "⏱ " + formatTimeSeconds(sec);
    } else {
      el.textContent = "";
      // タイマー切れたらグリッド再描画
      renderContent();
    }
  });
}

setInterval(updateTimers, 1000);

// 初期化
cleanExpiredTimers();
renderContent();
</script>
