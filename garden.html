<script>
// ── 多言語ヘルパー（他のスクリプトブロックからも参照するため最初に定義） ──
function currentLang(){
  return (window.i18n && typeof window.i18n.getCurrentLang === "function")
    ? window.i18n.getCurrentLang()
    : "ja";
}
function T(key, fallback, vars){
  if(window.i18n && typeof window.i18n.isReady === "function" && window.i18n.isReady()){
    return window.i18n.t(key, vars);
  }
  if(vars){
    Object.entries(vars).forEach(([k,v])=>{ fallback = fallback.replaceAll(`{${k}}`, v); });
  }
  return fallback;
}
function displayName(item){
  if(!item.nameI18n) return item.name;
  const lang = currentLang();
  return item.nameI18n[lang] || item.name;
}
function translateEventName(name){
  return T("garden_event_" + name, name);
}
function translateColor(c){
  return T("garden_color_" + c, c);
}

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB6aGH4BCn2NFNUMeon9LTM_ck2vKoWYFI",
  authDomain: "heartopilist-c8b69.firebaseapp.com",
  projectId: "heartopilist-c8b69",
  storageBucket: "heartopilist-c8b69.firebasestorage.app",
  messagingSenderId: "906963149499",
  appId: "1:906963149499:web:14ab2b1bd7c079f616bf9e",
};

const VAPID_KEY = "BHsuetgZxjPnNS1eiqkIRwmFhddZkN0FweRiAbwCv3ixBEnTODksIpyOoHi72HLtOLYdYZ9xno-K1RJE93247LQ";
const REGISTER_URL = "https://registertimer-e67djhnlrq-uc.a.run.app";
const CANCEL_URL   = "https://canceltimer-e67djhnlrq-uc.a.run.app";

firebase.initializeApp(FIREBASE_CONFIG);
const messaging = firebase.messaging();

async function getFCMToken() {
  try {
    const sw = await navigator.serviceWorker.register("./firebase-messaging-sw.js");
    await navigator.serviceWorker.ready;
    const token = await messaging.getToken({
      vapidKey: VAPID_KEY,
      serviceWorkerRegistration: sw
    });
    if(token){
      localStorage.setItem("fcmToken", token);
      return token;
    }
  } catch(e) {
    console.error("FCMトークン取得失敗:", e);
  }
  return null;
}

function updateNotifBanner(){
  const banner = document.getElementById("notifBanner");
  const text   = document.getElementById("notifBannerText");
  const btn    = document.getElementById("notifAllowBtn");

  if(Notification.permission === "granted"){
    banner.style.display = "none";
  } else if(Notification.permission === "denied"){
    banner.style.display = "block";
    text.innerHTML = T("garden_notif_blocked_text","🔕 通知がブロックされています。<br>端末・ブラウザの設定からこのサイトの通知を「許可」に変更後、下のボタンを押してください。");
    btn.textContent = T("garden_notif_recheck_btn","再確認する");
  } else {
    banner.style.display = "block";
    text.textContent = T("garden_notif_permission_text","🔔 バックグラウンド通知を受け取るには通知の許可が必要です");
    btn.textContent = T("garden_notif_permission_btn","通知を許可する");
  }
}


async function requestNotifPermission() {
  if(Notification.permission === "denied"){
    // JSからは再度ダイアログを出せないので、設定変更済みかどうかを再チェックするだけ
    updateNotifBanner();
    if(Notification.permission === "granted"){
      const token = await getFCMToken();
      if(token) showToast(T("garden_toast_notif_enabled","通知が有効になりました！"));
    } else {
      showToast(T("garden_toast_still_blocked","まだブロックされています。設定をご確認ください"));
    }
    return;
  }

  const permission = await Notification.requestPermission();
  updateNotifBanner();
  if(permission === "granted"){
    const token = await getFCMToken();
    if(token){
      showToast(T("garden_toast_notif_enabled","通知が有効になりました！"));
    } else {
      showToast(T("garden_toast_token_failed","トークン取得に失敗しました"));
    }
  } else {
    showToast(T("garden_toast_notif_denied","通知が拒否されました"));
  }
}

document.getElementById("notifAllowBtn").addEventListener("click", requestNotifPermission);

messaging.onMessage((payload) => {
  showToast(payload.notification?.title || "通知が届きました");
});

async function registerNotification(item, mode) {
  const token = localStorage.getItem("fcmToken") || await getFCMToken();
  if(!token){
    showToast(T("garden_toast_allow_first","先に通知を許可してください"));
    return;
  }

  const now = Date.now();
  const growMs = item.growTime * 60 * 1000;
  let notifyTimes = [];

  if(mode === "normal"){
    notifyTimes = [{ label:"harvest", time: now + growMs }];
  } else if(mode === "weed"){
    const third = Math.floor(growMs / 3);
    notifyTimes = [
      { label:"草抜き1回目", time: now + third },
      { label:"草抜き2回目", time: now + third * 2 },
      { label:"草抜き3回目", time: now + growMs - 90000 },
      { label:"harvest",    time: now + growMs },
    ];
  }

  // ★ 先にlocalStorageを更新してUIを即座に反映（start/totalを保存：進行バー用）
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  timers[item.name + "_" + mode] = { end: now + growMs, start: now, total: growMs, mode };
  localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
  showToast(T("garden_toast_notif_set","通知をセットしました（{time}後）",{time:formatTime(item.growTime)}));
  renderModal(window.currentItem);
  renderContent();

  // APIはバックグラウンドで送信
  try {
    const res = await fetch(REGISTER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fcmToken: token, cropName: item.name, mode, notifyTimes }),
    });
    if(!res.ok){
      delete timers[item.name + "_" + mode];
      localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
      showToast(T("garden_toast_notif_set_failed","通知のセットに失敗しました"));
      renderModal(window.currentItem);
      renderContent();
    }
  } catch(e) {
    console.error(e);
    delete timers[item.name + "_" + mode];
    localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
    showToast(T("garden_toast_notif_set_failed","通知のセットに失敗しました"));
    renderModal(window.currentItem);
    renderContent();
  }
}

async function cancelNotification(item, mode) {
  // ★ 先にlocalStorageを更新してUIを即座に反映
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  delete timers[item.name + "_" + mode];
  localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
  showToast(T("garden_toast_notif_canceled","通知をキャンセルしました"));
  renderModal(window.currentItem);
  renderContent();

  // APIはバックグラウンドで送信
  const token = localStorage.getItem("fcmToken");
  if(token){
    try {
      await fetch(CANCEL_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fcmToken: token, cropName: item.name }),
      });
    } catch(e) { console.error(e); }
  }
}

(async () => {
  if(Notification.permission === "granted"){
    localStorage.removeItem("fcmToken");
    const token = await getFCMToken();
    if(token){
      console.log("FCM取得成功");
    }
  }
  updateNotifBanner();
})();

document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible"){
    updateNotifBanner();
    if(Notification.permission === "granted" && !localStorage.getItem("fcmToken")){
      getFCMToken();
    }
  }
});

</script>

<script>
// ── ダークモード ──
const darkToggle = document.getElementById("darkToggle");
const savedDark = localStorage.getItem("darkMode");
if(savedDark === "true") document.body.classList.add("dark");
else if(savedDark === null && window.matchMedia("(prefers-color-scheme: dark)").matches)
  document.body.classList.add("dark");

function updateDarkBtn(){
  darkToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
}
updateDarkBtn();
darkToggle.onclick = ()=>{
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
  updateDarkBtn();
  forceRepaint();
};

function forceRepaint(){
  // Safari/iPad再描画バグ対策
  document.body.style.display = "none";
  document.body.offsetHeight;
  document.body.style.display = "";
}

// ── コンプリート（⭐️）データ ──
let checkedData = JSON.parse(localStorage.getItem("garden_checked") || "{}");

function toggleChecked(name){
  checkedData[name] = !checkedData[name];
  localStorage.setItem("garden_checked", JSON.stringify(checkedData));
  renderContent();
}

// ── 認証データ ──
let authData = JSON.parse(localStorage.getItem("authData") || "{}");

function toggleAuth(name){
  authData[name] = !authData[name];
  localStorage.setItem("authData", JSON.stringify(authData));
  renderContent();
}

// ── 画像プリロード（IntersectionObserver方式） ──
const gardenImgObserver = new IntersectionObserver((entries, obs) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      const item = entry.target._item;
      if(item.seedImg){
        const img = new Image();
        img.src = item.seedImg;
      }
      obs.unobserve(entry.target); // 一度読み込んだら監視解除
    }
  });
}, { rootMargin: "300px" }); // 画面に入る300px手前から先読み開始

// ── 通知タイマー ──
function isNotifSet(item, mode){
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  const t = timers[item.name + "_" + mode];
  if(!t) return false;
  return t.end > Date.now();
}

function getRemainingMs(item, mode){
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  const t = timers[item.name + "_" + mode];
  if(!t) return null;
  const ms = t.end - Date.now();
  return ms > 0 ? ms : null;
}

function cleanExpiredTimers(){
  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");
  const now = Date.now();
  Object.keys(timers).forEach(k => { if(timers[k].end <= now) delete timers[k]; });
  localStorage.setItem("gardenNotifTimers", JSON.stringify(timers));
}

// ── 時間フォーマット（分） ──
function formatTime(min){
  const minLabel = T("food_min","分");
  const hourLabel = T("food_hour","時間");
  const sep = currentLang() === "en" ? " " : "";
  if(min < 60) return `${min}${sep}${minLabel}`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  if(m === 0) return `${h}${sep}${hourLabel}`;
  return `${h}${sep}${hourLabel} ${m}${sep}${minLabel}`;
}

// ── 時間フォーマット（秒） ──
function formatTimeSeconds(sec){
  if(sec < 60) return `${sec}秒`;
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  if(m < 60) return s > 0 ? `${m}分${s}秒` : `${m}分`;
  const h = Math.floor(m / 60);
  const rm = m % 60;
  if(rm === 0) return s > 0 ? `${h}時間${s}秒` : `${h}時間`;
  return s > 0 ? `${h}時間${rm}分${s}秒` : `${h}時間${rm}分`;
}

// ── 時計風フォーマット（v85方式） ──
function formatClock(sec){
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${h > 0 ? h + ":" : ""}${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
}

// ── タブ ──
let currentTab = "crop";
window.currentItem = null;

function setTab(tab){
  currentTab = tab;
  ["crop","flower"].forEach(t=>{
    document.getElementById("tab-"+t).classList.toggle("active", t === tab);
  });
  renderContent();
}

// ── グリッド描画 ──
// ★ season / fes に対応
function renderContent(){
  const el = document.getElementById("gardenContent");
  el.innerHTML = "";

  const data  = currentTab === "crop" ? cropData : flowerData;

  const normalList       = data.filter(d => !d.season && !d.fes);
  const seasonActiveList = data.filter(d => d.season && !d.ended);
  const seasonEndedList  = data.filter(d => d.season && d.ended);
  const fesActiveList    = data.filter(d => d.fes && !d.ended);
  const fesEndedList     = data.filter(d => d.fes && d.ended);

  const normalKey = currentTab === "crop" ? "garden_section_normal_crop" : "garden_section_normal_flower";
  const normalFallback = currentTab === "crop" ? "通常の作物" : "通常の花";
  const seasonKey = currentTab === "crop" ? "garden_section_season_crop" : "garden_section_season_flower";
  const seasonFallback = currentTab === "crop" ? "🌸 シーズン作物" : "🌸 シーズン花";
  const fesKey = currentTab === "crop" ? "garden_section_fes_crop" : "garden_section_fes_flower";
  const fesFallback = currentTab === "crop" ? "🎉 フェス作物" : "🎉 フェス花";

  el.appendChild(renderSection(T(normalKey, normalFallback), normalList));
  if(seasonActiveList.length) el.appendChild(renderSection(T(seasonKey, seasonFallback), seasonActiveList, "season"));
  if(seasonEndedList.length)  el.appendChild(renderSection(T(seasonKey, seasonFallback), seasonEndedList, "season_ended"));
  if(fesActiveList.length)    el.appendChild(renderSection(T(fesKey, fesFallback), fesActiveList, "fes"));
  if(fesEndedList.length)     el.appendChild(renderSection(T(fesKey, fesFallback), fesEndedList, "fes_ended"));
}

// ★ eventStatus: null | "season" | "season_ended" | "fes" | "fes_ended"
function renderSection(label, items, eventStatus = null){
  const wrap = document.createElement("div");

  const lbl = document.createElement("div");
  lbl.className = "section-label";
  lbl.textContent = label;
  wrap.appendChild(lbl);

  if(eventStatus === "season" || eventStatus === "fes"){
    const banner = document.createElement("div");
    banner.className = "event-ended-banner";
    banner.textContent = T("garden_banner_active","📍 現在開催中です");
    wrap.appendChild(banner);
  } else if(eventStatus === "season_ended" || eventStatus === "fes_ended"){
    const banner = document.createElement("div");
    banner.className = "event-ended-banner";
    banner.textContent = T("garden_banner_ended","⚠️ 現在このイベントは終了しています");
    wrap.appendChild(banner);
  }

  const grid = document.createElement("div");
  grid.className = "garden-grid";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "garden-item";

    const isEventItem = !!(item.season || item.fes);
    const hasNotif = !isEventItem && (isNotifSet(item,"normal") || isNotifSet(item,"weed"));
    const isAuthed = item.auth !== false && !!authData[item.name];
    const isChecked = !!checkedData[item.name];

    div.innerHTML = `
      <div class="img-wrap">
        <div class="level-badge">Lv.${item.level}</div>
        ${hasNotif ? '<div class="notif-badge">🔔</div>' : ''}
        <button class="check-btn ${isChecked ? "checked" : ""}">
          ${isChecked ? "⭐️" : ""}
        </button>
        ${item.auth !== false ? `
          <button class="auth-btn ${isAuthed ? "checked" : ""}">
            ${isAuthed ? "🎖" : ""}
          </button>
        ` : ''}
        <img src="${item.img}" alt="${displayName(item)}" loading="lazy">
      </div>
      <div class="item-name">${displayName(item)}</div>
      <div class="garden-item-sub">${formatTime(item.growTime)}</div>
      ${hasNotif ? `
        <div class="garden-item-timer" id="timer-${CSS.escape(item.name)}"></div>
        <div class="garden-progress-track" id="track-${CSS.escape(item.name)}">
          <div class="garden-progress-fill" id="bar-${CSS.escape(item.name)}" style="width:0%"></div>
        </div>
      ` : ''}
    `;

    const checkBtn = div.querySelector(".check-btn");
    checkBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleChecked(item.name);
    });

    const authBtn = div.querySelector(".auth-btn");
    if(authBtn){
      authBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleAuth(item.name);
      });
    }

    div._item = item;
    gardenImgObserver.observe(div);

    div.onclick = () => openModal(item);
    grid.appendChild(div);
  });

  wrap.appendChild(grid);
  return wrap;
}

// ── モーダル ──
function openModal(item){
  window.currentItem = item;
  renderModal(item);
  document.getElementById("detailModal").style.display = "block";
}

function closeModal(){
  document.getElementById("detailModal").style.display = "none";
  window.currentItem = null;
}

function renderModal(item){
  if(!item) return;
  const isFlower = currentTab === "flower";
  const box = document.getElementById("modalBox");
  const isEventItem = !!(item.season || item.fes);

  const stars = ["☆1","☆2","☆3","☆4","☆5"];
  const priceRows = stars.map((s,i) => {
    const p = item.prices[i];
    return `<tr>
      <td>${s}</td>
      <td>${p !== null ? p.toLocaleString() : '<span class="g-price-null">' + T("garden_price_unknown","未確認") + '</span>'}</td>
    </tr>`;
  }).join("");

  let breedingHTML = "";
  if(isFlower && item.colors && item.colors.length > 0){
    const chips = item.colors.map(c => {
      const r = colorRarity[c] || 1;
      return `<span class="breeding-chip rarity-${r}">${translateColor(c)}</span>`;
    }).join("");

    const orLabel = T("garden_breeding_or","または");
    const examples = [
      { from:["赤","黄","白"], to:`${translateColor("オレンジ")}${orLabel}${translateColor("ピンク")}`, rFrom:1, rTo:2 },
      { from:["オレンジ","ピンク"], to:`${translateColor("黒")}${orLabel}${translateColor("桃")}`, rFrom:2, rTo:3 },
      { from:["黒","桃"], to:`${translateColor("紫")}・${translateColor("青")}・${translateColor("緑")}`, rFrom:3, rTo:4 },
      { from:["紫","青","緑"], to:`${translateColor("輝く")}${orLabel}${translateColor("夜光")}`, rFrom:4, rTo:5 },
    ].filter(ex =>
      ex.from.some(f => item.colors.includes(f)) &&
      item.colors.some(c => colorRarity[c] === ex.rTo)
    ).map(ex => `
      <div class="breeding-combo">
        <span class="breeding-chip rarity-${ex.rFrom}">
          ${ex.from.filter(f => item.colors.includes(f)).map(translateColor).join(" / ")}
        </span>
        <span class="breeding-combo-arrow">×2 →</span>
        <span class="breeding-chip rarity-${ex.rTo}">${ex.to}</span>
      </div>
    `).join("");

    breedingHTML = `
      <div style="margin-bottom:12px;">
        <div class="g-section-title">${T("garden_breeding_title","🌸 交配で作れる色")}</div>
        <div class="breeding-note">${T("garden_breeding_note","毎朝6時に交配が行われます。同じ色を2株並べると上のレア度の種ができます。")}</div>
        <div class="breeding-grid">${chips}</div>
        ${examples ? `<div style="font-size:11px;color:var(--text-sub);margin-bottom:6px;">${T("garden_breeding_examples_label","組み合わせ例")}</div>${examples}` : ""}
      </div>
    `;
  }

  // 通知（作物のみ・イベント終了済みは除外）
  let notifHTML = "";
  if(!isFlower && !isEventItem){
    const normalSet = isNotifSet(item,"normal");
    const weedSet   = isNotifSet(item,"weed");

    notifHTML = `
      <div style="margin-bottom:12px;">
        <div class="g-section-title">${T("garden_notif_title","🔔 収穫通知")}</div>
        <div class="notif-btns">
          <button class="notif-btn ${normalSet ? "set" : ""}"
            data-action="${normalSet ? "cancel" : "register"}" data-mode="normal">
            ${normalSet ? T("garden_notif_normal_on","✅ 通常：通知中") : T("garden_notif_normal_off","🔔 通常モード")}
          </button>
          <button class="notif-btn ${weedSet ? "set" : ""}"
            data-action="${weedSet ? "cancel" : "register"}" data-mode="weed">
            ${weedSet ? T("garden_notif_weed_on","✅ 草抜き：通知中") : T("garden_notif_weed_off","🌿 草抜きモード")}
          </button>
        </div>
        <div class="notif-desc">
          ${T("garden_notif_desc","通常：収穫タイムにバックグラウンド通知<br>草抜き：草抜きタイミング3回＋収穫時に通知")}
        </div>
      </div>
    `;
  }

  box.innerHTML = `
    <div class="g-modal-name">${displayName(item)}</div>
    <div class="g-modal-imgs">
      <div class="g-modal-img-wrap">
        <img src="${item.seedImg}" alt="${displayName(item)} ${T("garden_seed_label","種")}">
        <div class="g-modal-img-label">${T("garden_seed_label","種")}</div>
      </div>
      <div class="g-modal-img-wrap">
        <img src="${item.img}" alt="${displayName(item)}">
        <div class="g-modal-img-label">${isFlower ? T("garden_flower_label","花") : T("garden_crop_label","作物")}</div>
      </div>
    </div>
    <div class="g-info">
      <div class="g-info-row">
        <span class="g-info-label">${T("garden_level","レベル")}</span>
        <span class="g-info-value">Lv.${item.level}</span>
      </div>
      <div class="g-info-row">
        <span class="g-info-label">${T("garden_grow_time","成長時間")}</span>
        <span class="g-info-value">${formatTime(item.growTime)}</span>
      </div>
      <div class="g-info-row">
        <span class="g-info-label">${T("garden_seed_price","種の値段")}</span>
        <span class="g-info-value">${item.seedPrice.toLocaleString()} ${T("garden_coin","コイン")}</span>
      </div>
      ${!isFlower ? `
      <div class="g-info-row">
        <span class="g-info-label">${T("garden_weeding","草抜き")}</span>
        <span class="g-info-value">${T("garden_weeding_max","最大{count}回",{count:item.weedCount})}</span>
      </div>` : ""}
      ${isEventItem ? `
      <div class="g-info-row">
        <span class="g-info-label">${item.fes ? T("garden_fes","フェス") : T("garden_season","シーズン")}</span>
        <span class="g-info-value">${translateEventName(item.eventName)}${item.ended ? T("garden_ended_suffix","（終了）") : T("garden_active_suffix","（開催中）")}</span>
      </div>` : ""}
    </div>
    <table class="g-price-table">
      <tr><th>${T("garden_rarity","レア度")}</th><th>${T("garden_price","売価")}</th></tr>
      ${priceRows}
    </table>
    ${breedingHTML}
    ${notifHTML}
    <button class="g-close-btn" onclick="closeModal()">${T("garden_close","閉じる")}</button>
  `;

  box.querySelectorAll("[data-action]").forEach(btn => {
    btn.addEventListener("click", () => {
      const action = btn.dataset.action;
      const mode   = btn.dataset.mode;
      if(action === "register") registerNotification(window.currentItem, mode);
      if(action === "cancel")   cancelNotification(window.currentItem, mode);
    });
  });
}

// ── トースト ──
function showToast(msg){
  const t = document.getElementById("gardenToast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"), 2500);
}

// ── ★ 1秒ごとにカード上のタイマー・進行バー・草抜きマーカーを更新 ──
function updateTimers(){
  const allItems = [
    ...(typeof cropData !== "undefined" ? cropData : []),
    ...(typeof flowerData !== "undefined" ? flowerData : []),
  ];

  const timers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");

  allItems.forEach(item => {
    const el  = document.getElementById("timer-" + CSS.escape(item.name));
    const bar = document.getElementById("bar-" + CSS.escape(item.name));
    if(!el) return;

    const tNormal = timers[item.name + "_normal"];
    const tWeed   = timers[item.name + "_weed"];
    const t = (tNormal && tNormal.end > Date.now()) ? tNormal
            : (tWeed && tWeed.end > Date.now()) ? tWeed
            : null;

    if(t){
      const ms = t.end - Date.now();
      const sec = Math.ceil(ms / 1000);
      el.textContent = "⏱ " + formatClock(sec);

      const total = t.total || (item.growTime * 60 * 1000);

      if(bar){
        const progress = Math.max(0, Math.min(100, ((total - ms) / total) * 100));
        bar.style.width = progress + "%";
      }

      // 草抜きモードなら3つのマーカーを表示（一度だけ）
      const track = document.getElementById("track-" + CSS.escape(item.name));
      if(track && t.mode === "weed" && !track.dataset.markersAdded){
        const third = total / 3;
        const positions = [
          (third / total) * 100,
          (third * 2 / total) * 100,
          ((total - 90000) / total) * 100,
        ];
        positions.forEach(pos => {
          const marker = document.createElement("div");
          marker.className = "weed-marker";
          marker.style.left = pos + "%";
          track.appendChild(marker);
        });
        track.dataset.markersAdded = "true";
      }
    } else {
      el.textContent = "";
      // タイマー切れたらグリッド再描画
      renderContent();
    }
  });
}

setInterval(updateTimers, 1000);

document.getElementById("helpBtn").onclick = () => {
  document.getElementById("modalBox").innerHTML = `
    <div class="g-modal-name">${T("garden_help_title","使い方")}</div>
    <div class="g-info" style="text-align:left;">
      ${T("garden_help_body","🌱 通常モード：収穫タイミングで1回通知<br>🌿 草抜きモード：草抜き3回＋収穫タイミングで通知<br>🔔：通知ONの作物に表示<br>⭐️：星5チェック<br>🎖：認証マスターチェック<br><br>⚠️使用上の注意<br>通知には最大1分の誤差があり、草抜きモードでは、最初の2回は『成長時間÷3の1分前後』のタイミングで通知され、3回目は、『収穫時間の1〜2分前』に通知されます。<br>この通知機能はホーム追加した状態でしか使えず、通知許可をしていないと使えないのでご了承ください。<br>また不具合等あれば急に機能停止させる場合もありますが、そちらも合わせてご了承ください🙇‍♂️")}
    </div>
    <button class="g-close-btn" onclick="closeModal()">${T("garden_close","閉じる")}</button>
  `;
  document.getElementById("detailModal").style.display = "block";
};


// 初期化
cleanExpiredTimers();
renderContent();

// 言語切替時に再描画
document.addEventListener("langchange", () => {
  renderContent();
  updateNotifBanner();
  if(window.currentItem) renderModal(window.currentItem);
});

</script>
