<div id="notifBanner">
  🔔 通知機能を使うには通知の許可が必要です<br>
  <button onclick="requestNotif()" style="margin-top:6px; padding:5px 16px; border:1px solid var(--gold); border-radius:999px; background:transparent; color:var(--gold); font-size:11px; cursor:pointer;">通知を許可する</button>

  <div class="modal-box" id="modalBox"></div>

<script>

// ── ダークモード ──
const darkToggle = document.getElementById("darkToggle");
const savedDark = localStorage.getItem("darkMode");
if(savedDark === "true") document.body.classList.add("dark");
else if(savedDark === null && window.matchMedia("(prefers-color-scheme: dark)").matches)
  document.body.classList.add("dark");

function updateDarkBtn(){
  darkToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
}
updateDarkBtn();
darkToggle.onclick = ()=>{
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
  updateDarkBtn();
};

// ── 通知 ──
let notifTimers = JSON.parse(localStorage.getItem("gardenNotifTimers") || "{}");

function checkNotifPermission(){
  if(!("Notification" in window)) return;
  if(Notification.permission === "default"){
    document.getElementById("notifBanner").style.display = "block";
  }
}

function requestNotif(){
  Notification.requestPermission().then(p=>{
    if(p === "granted"){
      document.getElementById("notifBanner").style.display = "none";
      showToast("通知が有効になりました！");
    }
  });
}

function sendNotif(title, body){
  if(Notification.permission === "granted"){
    new Notification(title, { body, icon:"./apple-touch-icon.png" });
  }
}

// 通知をセット
function setNotification(item, mode){
  const key = item.name + "_" + mode;
  const now = Date.now();

  // 既存タイマーをクリア
  if(notifTimers[key]){
    clearTimeout(notifTimers[key + "_timer"]);
  }

  const growMs = item.growTime * 60 * 1000;

  if(mode === "normal"){
    // 収穫通知
    const t = setTimeout(()=>{
      sendNotif("🌾 収穫タイム！", `${item.name}が育ちました！`);
      delete notifTimers[key];
      localStorage.setItem("gardenNotifTimers", JSON.stringify(notifTimers));
      renderModal(currentItem);
    }, growMs);
    notifTimers[key] = { end: now + growMs, mode };
    localStorage.setItem("gardenNotifTimers", JSON.stringify(notifTimers));
    showToast(`収穫通知をセットしました（${formatTime(item.growTime)}後）`);

  } else if(mode === "weed"){
    // 草抜き通知（成長時間を4等分した間隔で3回）
    const interval = Math.floor(growMs / 4);
    [1,2,3].forEach(i=>{
      setTimeout(()=>{
        sendNotif("🌿 草抜きタイム！", `${item.name}の草抜きタイミングです！（${i}/3回目）`);
      }, interval * i);
    });
    // 収穫通知
    setTimeout(()=>{
      sendNotif("🌾 収穫タイム！", `${item.name}が育ちました！`);
      delete notifTimers[key];
      localStorage.setItem("gardenNotifTimers", JSON.stringify(notifTimers));
      renderModal(currentItem);
    }, growMs);
    notifTimers[key] = { end: now + growMs, mode };
    localStorage.setItem("gardenNotifTimers", JSON.stringify(notifTimers));
    showToast(`草抜き通知をセットしました（${formatTime(item.growTime)}後まで）`);
  }
}

// 通知キャンセル
function cancelNotification(item, mode){
  const key = item.name + "_" + mode;
  delete notifTimers[key];
  localStorage.setItem("gardenNotifTimers", JSON.stringify(notifTimers));
  showToast("通知をキャンセルしました");
  renderModal(currentItem);
}

// 通知が有効かチェック
function isNotifSet(item, mode){
  const key = item.name + "_" + mode;
  const t = notifTimers[key];
  if(!t) return false;
  return t.end > Date.now();
}

// 残り時間
function getRemaining(item, mode){
  const key = item.name + "_" + mode;
  const t = notifTimers[key];
  if(!t) return null;
  const ms = t.end - Date.now();
  if(ms <= 0) return null;
  return formatTime(Math.ceil(ms / 60000));
}

// 時間フォーマット（分→表示）
function formatTime(min){
  if(min < 60) return `${min}分`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  if(m === 0) return `${h}時間`;
  return `${h}時間${m}分`;
}

// ── タブ ──
let currentTab = "crop";
let currentItem = null;

function setTab(tab){
  currentTab = tab;
  ["crop","flower"].forEach(t=>{
    document.getElementById("tab-"+t).classList.toggle("active", t === tab);
  });
  renderContent();
}

// ── 描画 ──
function renderContent(){
  const el = document.getElementById("gardenContent");
  el.innerHTML = "";

  if(currentTab === "crop"){
    const normal = cropData.filter(c => !c.isEvent);
    const event  = cropData.filter(c => c.isEvent);
    el.appendChild(renderSection("通常作物", normal));
    if(event.length > 0){
      const eventSection = renderSection("イベント作物", event, true);
      el.appendChild(eventSection);
    }
  } else {
    const normal = flowerData.filter(f => !f.isEvent);
    const event  = flowerData.filter(f => f.isEvent);
    el.appendChild(renderSection("通常の花", normal));
    if(event.length > 0){
      const eventSection = renderSection("イベントの花", event, true);
      el.appendChild(eventSection);
    }
  }
}

function renderSection(label, items, isEvent=false){
  const wrap = document.createElement("div");

  const lbl = document.createElement("div");
  lbl.className = "section-label";
  lbl.textContent = label;
  wrap.appendChild(lbl);

  if(isEvent){
    const banner = document.createElement("div");
    banner.className = "event-ended-banner";
    banner.textContent = "⚠️ 現在このイベントは終了しています";
    wrap.appendChild(banner);
  }

  const grid = document.createElement("div");
  grid.className = "garden-grid";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "garden-item";

    const hasNotif = isNotifSet(item,"normal") || isNotifSet(item,"weed");

    div.innerHTML = `
      <div class="lv-badge">Lv.${item.level}</div>
      ${hasNotif ? '<div class="notif-badge">🔔</div>' : ''}
      <img src="${item.img}" alt="${item.name}" loading="lazy">
      <div class="garden-item-name">${item.name}</div>
      <div class="garden-item-sub">${formatTime(item.growTime)}</div>
    `;

    div.onclick = () => openModal(item);
    grid.appendChild(div);
  });

  wrap.appendChild(grid);
  return wrap;
}

// ── モーダル ──
function openModal(item){
  currentItem = item;
  renderModal(item);
  document.getElementById("detailModal").style.display = "block";
}

function closeModal(){
  document.getElementById("detailModal").style.display = "none";
  currentItem = null;
  renderContent();
}

function renderModal(item){
  const isFlower = currentTab === "flower";
  const box = document.getElementById("modalBox");

  // 売価テーブル
  const stars = ["☆1","☆2","☆3","☆4","☆5"];
  const priceRows = stars.map((s,i) => {
    const p = item.prices[i];
    return `<tr>
      <td>${s}</td>
      <td>${p !== null ? p.toLocaleString() : '<span class="price-null">未確認</span>'}</td>
    </tr>`;
  }).join("");

  // 交配セクション（花のみ）
  let breedingHTML = "";
  if(isFlower && item.colors && item.colors.length > 0){
    const chips = item.colors.map(c => {
      const r = colorRarity[c] || 1;
      return `<span class="breeding-chip rarity-${r}">${c}</span>`;
    }).join("");

    // 組み合わせ例（同レア度→次のレア度）
    const examples = [
      { from:["赤","黄","白"], to:"オレンジまたはピンク", rFrom:1, rTo:2 },
      { from:["オレンジ","ピンク"], to:"黒または桃", rFrom:2, rTo:3 },
      { from:["黒","桃"], to:"紫・青・緑", rFrom:3, rTo:4 },
      { from:["紫","青","緑"], to:"輝くまたは夜光", rFrom:4, rTo:5 },
    ].filter(ex =>
      ex.from.some(f => item.colors.includes(f)) &&
      item.colors.some(c => colorRarity[c] === ex.rTo)
    ).map(ex => `
      <div class="breeding-combo">
        <span class="breeding-chip rarity-${ex.rFrom}">${ex.from.filter(f => item.colors.includes(f)).join(" / ")}</span>
        <span class="breeding-combo-arrow">×2 →</span>
        <span class="breeding-chip rarity-${ex.rTo}">${ex.to}</span>
      </div>
    `).join("");

    breedingHTML = `
      <div class="breeding-section">
        <div class="breeding-title">🌸 交配で作れる色</div>
        <div class="breeding-note">毎朝6時に交配が行われます。同じ色を2株並べると上のレア度の種ができます。</div>
        <div class="breeding-grid">${chips}</div>
        ${examples ? `<div style="margin-top:10px; font-size:11px; color:var(--text-sub); margin-bottom:6px;">組み合わせ例</div>${examples}` : ""}
      </div>
    `;
  }

  // 通知セクション（作物のみ）
  let notifHTML = "";
  if(!isFlower){
    const normalSet = isNotifSet(item,"normal");
    const weedSet   = isNotifSet(item,"weed");
    const normalRem = getRemaining(item,"normal");
    const weedRem   = getRemaining(item,"weed");

    notifHTML = `
      <div class="notif-section">
        <div class="notif-title">🔔 収穫通知</div>
        <div class="notif-btns">
          <button class="notif-btn ${normalSet ? "set" : ""}"
            onclick="${normalSet
              ? `cancelNotification(currentItem,'normal')`
              : `setNotification(currentItem,'normal')`}">
            ${normalSet ? "✅ 通常：通知中" : "🔔 通常モード"}
          </button>
          <button class="notif-btn ${weedSet ? "set" : ""}"
            onclick="${weedSet
              ? `cancelNotification(currentItem,'weed')`
              : `setNotification(currentItem,'weed')`}">
            ${weedSet ? "✅ 草抜き：通知中" : "🌿 草抜きモード"}
          </button>
        </div>
        <div class="notif-desc">
          通常：収穫タイムに通知<br>
          草抜き：成長中に3回草抜きタイムを通知＋収穫時に通知
        </div>
        ${normalSet ? `<div class="notif-active-banner">🔔 通常通知中 あと${normalRem}で収穫</div>` : ""}
        ${weedSet   ? `<div class="notif-active-banner">🌿 草抜き通知中 あと${weedRem}で収穫</div>` : ""}
      </div>
    `;
  }

  box.innerHTML = `
    <div class="modal-name">${item.name}</div>
    <div class="modal-imgs">
      <div class="modal-img-wrap">
        <img src="${item.seedImg}" alt="${item.name}の種">
        <div class="modal-img-label">種</div>
      </div>
      <div class="modal-img-wrap">
        <img src="${item.img}" alt="${item.name}">
        <div class="modal-img-label">${isFlower ? "花" : "作物"}</div>
      </div>
    </div>
    <div class="modal-info">
      <div class="modal-info-row">
        <span class="modal-info-label">レベル</span>
        <span class="modal-info-value">Lv.${item.level}</span>
      </div>
      <div class="modal-info-row">
        <span class="modal-info-label">成長時間</span>
        <span class="modal-info-value">${formatTime(item.growTime)}</span>
      </div>
      <div class="modal-info-row">
        <span class="modal-info-label">種の値段</span>
        <span class="modal-info-value">${item.seedPrice.toLocaleString()} コイン</span>
      </div>
      ${!isFlower ? `
      <div class="modal-info-row">
        <span class="modal-info-label">草抜き</span>
        <span class="modal-info-value">最大${item.weedCount}回</span>
      </div>` : ""}
      ${item.isEvent ? `
      <div class="modal-info-row">
        <span class="modal-info-label">イベント</span>
        <span class="modal-info-value">${item.eventName}（終了）</span>
      </div>` : ""}
    </div>
    <table class="price-table">
      <tr>
        <th>レア度</th>
        <th>売価</th>
      </tr>
      ${priceRows}
    </table>
    ${breedingHTML}
    ${notifHTML}
    <button class="modal-close-btn" onclick="closeModal()">閉じる</button>
  `;
}

// ── トースト ──
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"), 2500);
}

// ── 起動時に期限切れ通知タイマーを掃除 ──
function cleanExpiredTimers(){
  const now = Date.now();
  Object.keys(notifTimers).forEach(k=>{
    if(notifTimers[k].end <= now){
      delete notifTimers[k];
    }
  });
  localStorage.setItem("gardenNotifTimers", JSON.stringify(notifTimers));
}

// 初期化
checkNotifPermission();
cleanExpiredTimers();
renderContent();
</script>
