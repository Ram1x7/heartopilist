<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>はとぴ図鑑｜料理</title>

<!-- ★ index完全依存 -->
<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- =========================
     title bar（index完全踏襲）
========================= -->
<div class="title-bar">
  <h1>料理図鑑</h1>

  <div class="title-buttons">
    <button id="helpBtn">ℹ️</button>
    <button id="shareBtn">📤</button>
    <button id="darkToggle">🌙</button>
  </div>
</div>

<!-- =========================
     ナビ（indexと統一）
========================= -->
<nav class="site-nav">
  <a class="site-nav-item active">料理</a>
  <a href="index.html" class="site-nav-item">図鑑へ</a>
</nav>

<!-- =========================
     検索・操作パネル
========================= -->
<div class="card sticky" id="topPanel">

  <div style="position:relative;">
    <input type="text" id="search" class="search" placeholder="🔍 料理名で検索">
    <button id="clearBtn">×</button>
  </div>

  <div class="filter" style="margin-top:8px;">
    <button id="multiBtn" onclick="toggleMultiSelect()">☑️複数選択</button>

    <button id="bulkStarBtn" onclick="bulkStar()" style="display:none;">⭐一括</button>
    <button id="bulkUnstarBtn" onclick="bulkUnstar()" style="display:none;">⭐解除</button>

    <button id="bulkAuthBtn" onclick="bulkAuth()" style="display:none;">🎖一括</button>
    <button id="bulkAuthUnBtn" onclick="bulkAuthUncheck()" style="display:none;">🎖解除</button>
  </div>

</div>

<!-- =========================
     グリッド
========================= -->
<div id="list" class="grid"></div>

<!-- =========================
     モーダル（index完全流用構造）
========================= -->
<div id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal-box">

    <h3 id="m_name"></h3>
    <img id="m_img">

    <div class="modal-info-row">
      <div class="modal-left">
        <p id="m_level"></p>
        <p id="m_materials"></p>
      </div>

      <div class="modal-right">
        <p id="m_prices"></p>
        <p id="m_profit"></p>
      </div>
    </div>

    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<!-- =========================
     DATA（別ファイル）
========================= -->
<script src="js/data-foods.js"></script>

<!-- =========================
     JS本体
========================= -->
<script>
const foods = foodsData;

let checkedData = JSON.parse(localStorage.getItem("food_checked") || "{}");
let authData = JSON.parse(localStorage.getItem("food_auth") || "{}");

let multiSelectMode = false;
let selectedItems = {};

const searchInput = document.getElementById("search");
const list = document.getElementById("list");
const clearBtn = document.getElementById("clearBtn");

searchInput.addEventListener("input", ()=>{
  clearBtn.style.display = searchInput.value ? "block" : "none";
  render();
});

clearBtn.onclick = ()=>{
  searchInput.value = "";
  clearBtn.style.display = "none";
  render();
};

// =========================
// 描画
// =========================
function render(){

  let data = [...foods];

  const k = searchInput.value;
  if(k){
    data = data.filter(f => f.name.includes(k));
  }

  list.innerHTML = "";

  data.forEach(f => {

    const el = document.createElement("div");
    el.className = "item" + (selectedItems[f.name] ? " selected" : "");

    el.innerHTML = `
      <div class="img-wrap">

        <div class="level-badge">Lv.${f.level}</div>

        <button class="check-btn ${checkedData[f.name] ? "checked" : ""}">
          ⭐️
        </button>

        <button class="auth-btn ${authData[f.name] ? "checked" : ""}">
          🎖
        </button>

        <img src="${f.image}">
      </div>

      <div class="item-name">${f.name}</div>
    `;

    el.onclick = ()=>{
      if(multiSelectMode){
        selectedItems[f.name] = !selectedItems[f.name];
        el.classList.toggle("selected");
        return;
      }
      openModal(f);
    };

    el.querySelector(".check-btn").onclick = (e)=>{
      e.stopPropagation();
      checkedData[f.name] = !checkedData[f.name];
      save();
      render();
    };

    el.querySelector(".auth-btn").onclick = (e)=>{
      e.stopPropagation();
      authData[f.name] = !authData[f.name];
      save();
      render();
    };

    list.appendChild(el);
  });
}

// =========================
// モーダル（利益計算込み）
// =========================
function openModal(f){

  modal.style.display = "block";

  m_name.innerText = f.name;
  m_img.src = f.image;

  m_level.innerText = "Lv." + f.level;

  // 材料
  m_materials.innerHTML = f.materials
    .map(m => `<img src="${m.image}" style="width:32px;margin:2px;">`)
    .join("");

  // 売値
  m_prices.innerHTML = f.prices
    .map((p,i)=>`★${i+1}: ${p ?? "-"}`)
    .join("<br>");

  // 利益（heartopia方式）
  const valid = f.prices.filter(p => p);
  const max = Math.max(...valid);
  const min = Math.min(...valid);

  m_profit.innerText =
    isFinite(max - min)
      ? `最大利益：${max - min}`
      : "-";
}

function closeModal(){
  modal.style.display = "none";
}

// =========================
// 複数選択
// =========================
function toggleMultiSelect(){
  multiSelectMode = !multiSelectMode;
  multiBtn.classList.toggle("active", multiSelectMode);
}

// =========================
// 保存
// =========================
function save(){
  localStorage.setItem("food_checked", JSON.stringify(checkedData));
  localStorage.setItem("food_auth", JSON.stringify(authData));
}

render();
</script>

</body>
</html>
