  <style>
    /* =============================================
       ベース（既存サイトのテーマカラー・フォントに合わせる）
       ============================================= */
    :root {
      --bg:        #f0f4f8;
      --card-bg:   #ffffff;
      --header-bg: #3c5a6e;
      --nav-bg:    #2e4657;
      --accent:    #4e9dcc;
      --accent2:   #f7c948;
      --text:      #1e2c38;
      --sub:       #6b8497;
      --border:    #d4e0ea;
      --green:     #28a745;
      --red:       #dc3545;
      --lv1:       #7aa8ff;
      --lv2:       #41b66f;
      --lv3:       #ff9800;
      --lv4:       #e040fb;
      --lv5:       #f44336;
    }
    [data-theme="dark"] {
      --bg:        #141c24;
      --card-bg:   #1e2c38;
      --header-bg: #1a2a36;
      --nav-bg:    #111d27;
      --accent:    #4e9dcc;
      --accent2:   #f7c948;
      --text:      #dce8f0;
      --sub:       #7a9db5;
      --border:    #2a3f52;
      --green:     #3dbb5e;
      --red:       #ff6070;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                   "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- ヘッダー ---- */
    header {
      background: var(--header-bg);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }

    .site-title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: .02em;
    }

    .header-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: background .15s;
    }
    .header-btn:hover { background: rgba(255,255,255,.15); }

    /* ---- ナビ ---- */
    nav {
      background: var(--nav-bg);
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }

    nav a {
      color: rgba(255,255,255,.7);
      text-decoration: none;
      padding: 10px 18px;
      font-size: .88rem;
      font-weight: 600;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s;
    }
    nav a:hover { color: #fff; }
    nav a.active {
      color: #fff;
      border-bottom-color: var(--accent2);
    }

    /* ---- メイン ---- */
    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 16px;
    }

    .page-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ---- コントロールバー ---- */
    .food-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .food-search-wrap {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 6px 12px;
      gap: 8px;
    }
    .food-search-wrap input {
      border: none;
      outline: none;
      background: transparent;
      font-size: .95rem;
      color: var(--text);
      width: 100%;
    }
    .food-search-wrap input::placeholder { color: var(--sub); }
    .food-search-wrap button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--sub);
      font-size: 1rem;
      padding: 0;
      line-height: 1;
    }

    .ctrl-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ctrl-group label {
      font-size: .7rem;
      color: var(--sub);
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .ctrl-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .chip-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: .8rem;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      font-weight: 500;
      white-space: nowrap;
    }
    .chip-btn.star-active  { background: var(--accent2); border-color: var(--accent2); color: #5a3e00; }
    .chip-btn.sort-active  { background: var(--accent);  border-color: var(--accent);  color: #fff; }
    .chip-btn.level-active { background: var(--header-bg); border-color: var(--header-bg); color: #fff; }

    /* ---- 比較ツール ---- */
    .compare-wrap {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .compare-title {
      font-size: .8rem;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 10px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .compare-selects {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .compare-selects select {
      flex: 1;
      min-width: 130px;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: .85rem;
    }
    .compare-selects span { color: var(--sub); font-weight: 700; }
    .compare-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .compare-btn:hover { opacity: .85; }

    .compare-result { display: flex; gap: 8px; align-items: stretch; margin-top: 8px; }
    .compare-col {
      flex: 1;
      background: var(--bg);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: .83rem;
      line-height: 1.8;
    }
    .compare-col strong { font-size: .9rem; }
    .compare-vs { font-size: .95rem; font-weight: 900; color: var(--sub); align-self: center; }
    .compare-winner {
      margin-top: 8px;
      font-size: .87rem;
      color: var(--text);
      text-align: center;
    }

    /* ---- カードリスト ---- */
    #foodList { display: flex; flex-direction: column; gap: 8px; }

    /* ---- カード ---- */
    .food-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: box-shadow .15s;
    }
    .food-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); }

    .food-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .food-thumb {
      width: 58px;
      height: 58px;
      object-fit: contain;
      border-radius: 10px;
      background: var(--bg);
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .food-card-body { flex: 1; min-width: 0; }
    .food-card-name {
      font-size: .97rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .food-tags { display: flex; flex-wrap: wrap; gap: 4px; }

    .tag {
      font-size: .72rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg);
      color: var(--sub);
      white-space: nowrap;
      font-weight: 500;
    }
    .tag-profit-pos { background: rgba(40,167,69,.12); color: var(--green); font-weight: 700; }
    .tag-profit-neg { background: rgba(220,53,69,.12); color: var(--red);   font-weight: 700; }
    .tag-price      { background: rgba(247,201,72,.15); color: #8a6400; }

    .lv-badge {
      font-size: .7rem;
      font-weight: 700;
      color: #fff;
      padding: 3px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .arrow {
      font-size: .7rem;
      color: var(--sub);
      transition: transform .2s;
      flex-shrink: 0;
    }
    .arrow.open { transform: rotate(180deg); }

    /* ---- 詳細エリア ---- */
    .food-detail {
      border-top: 1.5px solid var(--border);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .food-detail.hidden { display: none; }

    .detail-section-title {
      font-size: .75rem;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 7px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    /* ★別価格テーブル */
    .star-grid {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .star-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .83rem;
      padding: 4px 8px;
      border-radius: 8px;
      color: var(--text);
    }
    .star-row .sr-star { width: 28px; color: var(--sub); font-size: .78rem; }
    .star-row .sr-price { flex: 1; font-weight: 600; }
    .star-row.active-star {
      background: rgba(247,201,72,.15);
      border: 1px solid rgba(247,201,72,.4);
    }
    .star-row.active-star .sr-star { color: #b08000; font-weight: 700; }

    /* 材料グリッド */
    .materials-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .mat-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: .81rem;
      color: var(--text);
    }
    .mat-img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      border-radius: 7px;
      background: var(--card-bg);
      border: 1px solid var(--border);
    }
    .mat-no-img {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border-radius: 7px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .mat-label { line-height: 1.4; }
    .mat-label small { color: var(--sub); font-size: .7rem; display: block; }

    .cost-note {
      margin-top: 6px;
      font-size: .78rem;
      color: var(--sub);
    }

    /* ---- 空状態 ---- */
    .empty-state {
      text-align: center;
      color: var(--sub);
      padding: 40px 16px;
      font-size: .9rem;
    }

    /* ---- フッター ---- */
    footer {
      text-align: center;
      font-size: .75rem;
      color: var(--sub);
      padding: 32px 16px 24px;
    }

    /* ---- プロフィール色クラス ---- */
    .pos { color: var(--green); font-weight: 700; }
    .neg { color: var(--red);   font-weight: 700; }

    /* ---- レスポンシブ ---- */
    @media (max-width: 480px) {
      .food-card-header { gap: 8px; padding: 10px 12px; }
      .food-thumb { width: 50px; height: 50px; }
      .compare-result { flex-direction: column; }
      .compare-vs { align-self: unset; text-align: center; }
    }
  </style>
</head>

<main>
  <div class="page-title">🍳 料理レシピ図鑑</div>

  <!-- ---- コントロールバー ---- -->
  <div class="food-controls">

    <!-- 検索 -->
    <div class="food-search-wrap">
      <span style="color:var(--sub)">🔍</span>
      <input type="text" id="foodSearchInput" placeholder="料理名・材料で検索…">
      <button id="foodSearchClear" title="クリア">✕</button>
    </div>

    <div class="ctrl-row">
      <!-- ★フィルタ -->
      <div class="ctrl-group">
        <label>売価の★</label>
        <div class="ctrl-btns" id="starBtns">
          <button class="chip-btn star-active" data-star="1" onclick="setFoodStar(1)">★1</button>
          <button class="chip-btn" data-star="2" onclick="setFoodStar(2)">★2</button>
          <button class="chip-btn" data-star="3" onclick="setFoodStar(3)">★3</button>
          <button class="chip-btn" data-star="4" onclick="setFoodStar(4)">★4</button>
          <button class="chip-btn" data-star="5" onclick="setFoodStar(5)">★5</button>
        </div>
      </div>

      <!-- ソート -->
      <div class="ctrl-group">
        <label>並び替え</label>
        <div class="ctrl-btns" id="sortBtns">
          <button class="chip-btn sort-active" data-sort="default" onclick="setFoodSort('default')">デフォルト</button>
          <button class="chip-btn" data-sort="profit" onclick="setFoodSort('profit')">利益順</button>
          <button class="chip-btn" data-sort="hourly" onclick="setFoodSort('hourly')">時給順</button>
        </div>
      </div>

      <!-- レベルフィルタ -->
      <div class="ctrl-group">
        <label>レシピ Lv</label>
        <div class="ctrl-btns" id="levelBtns">
          <button class="chip-btn level-active" data-level="0" onclick="setFoodLevel(0)">すべて</button>
          <button class="chip-btn" data-level="1" onclick="setFoodLevel(1)">Lv.1</button>
          <button class="chip-btn" data-level="2" onclick="setFoodLevel(2)">Lv.2</button>
          <button class="chip-btn" data-level="3" onclick="setFoodLevel(3)">Lv.3</button>
          <button class="chip-btn" data-level="4" onclick="setFoodLevel(4)">Lv.4</button>
        </div>
      </div>
    </div>
  </div><!-- /.food-controls -->

  <!-- ---- 比較ツール ---- -->
  <div class="compare-wrap">
    <div class="compare-title">⚖️ 料理を比較する</div>
    <div class="compare-selects">
      <select id="foodSelectA"></select>
      <span>VS</span>
      <select id="foodSelectB"></select>
      <button class="compare-btn" onclick="compareFoods()">比較</button>
    </div>
    <div id="foodCompareResult"></div>
  </div>

  <!-- ---- カードリスト ---- -->
  <div id="foodList"></div>

</main>

<footer>
  ※ 非公式ファンツールです。ゲーム内情報と異なる場合があります。<br>
  <a href="index.html" style="color:var(--accent)">はとぴ図鑑 トップへ</a>
</footer>

<!-- ===================== ロジック ===================== -->
<script>
(function () {
  // ---- 状態 ----
  let starFilter  = 1;
  let sortType    = 'default';
  let searchQuery = '';
  let levelFilter = 0;
  let openId      = null;

  // ---- ヘルパー ----
  function getPrice(food) {
    return food.prices[Math.min(starFilter - 1, food.prices.length - 1)];
  }
  function getProfit(food) { return getPrice(food) - food.cost; }
  function getHourly(food) {
    if (!food.time) return Infinity;
    return Math.round((getProfit(food) / food.time) * 3600);
  }
  function formatTime(sec) {
    if (!sec || sec === 0) return '即時';
    if (sec < 60)   return `${sec}秒`;
    if (sec < 3600) return `${Math.floor(sec / 60)}分`;
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
    return m ? `${h}時間${m}分` : `${h}時間`;
  }
  function lvColor(lv) {
    return ['','var(--lv1)','var(--lv2)','var(--lv3)','var(--lv4)','var(--lv5)'][lv] || 'var(--lv1)';
  }

  // ---- フィルタ＆ソート ----
  function filtered() {
    let list = FOODS.slice();
    if (searchQuery.trim()) {
      const q = searchQuery.trim();
      list = list.filter(f => f.name.includes(q) || f.materials.some(m => m.name.includes(q)));
    }
    if (levelFilter > 0) list = list.filter(f => f.level === levelFilter);
    if (sortType === 'profit') list.sort((a, b) => getProfit(b) - getProfit(a));
    if (sortType === 'hourly') list.sort((a, b) => getHourly(b) - getHourly(a));
    return list;
  }

  // ---- レンダリング ----
  function render() {
    const container = document.getElementById('foodList');
    const list = filtered();

    if (!list.length) {
      container.innerHTML = '<div class="empty-state">😢 該当する料理がありません</div>';
      return;
    }

    container.innerHTML = list.map(food => {
      const price  = getPrice(food);
      const profit = getProfit(food);
      const hourly = getHourly(food);
      const isOpen = openId === food.id;

      const materialsHtml = food.materials.map(m => {
        const img = m.image
          ? `<img src="${m.image}" alt="${m.name}" class="mat-img" onerror="this.style.display='none'">`
          : `<div class="mat-no-img">🧂</div>`;
        return `<div class="mat-chip">
          ${img}
          <div class="mat-label">
            ${m.name}×${m.qty}
            ${m.note ? `<small>${m.note}</small>` : ''}
          </div>
        </div>`;
      }).join('');

      const allPricesHtml = food.prices.map((p, i) => {
        const pft = p - food.cost;
        const cls = i + 1 === starFilter ? 'star-row active-star' : 'star-row';
        const pftCls = pft >= 0 ? 'pos' : 'neg';
        return `<div class="${cls}">
          <span class="sr-star">★${i+1}</span>
          <span class="sr-price">${p.toLocaleString()}G</span>
          <span class="${pftCls}">${pft >= 0 ? '+' : ''}${pft.toLocaleString()}G</span>
        </div>`;
      }).join('');

      return `
      <div class="food-card" id="fc-${food.id}">
        <div class="food-card-header" onclick="toggleDetail(${food.id})">
          <img src="${food.image}" alt="${food.name}" class="food-thumb"
            onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'58\' height=\'58\'><rect fill=\'%23c8d8e8\' width=\'58\' height=\'58\' rx=\'10\'/><text x=\'50%\' y=\'55%\' text-anchor=\'middle\' dominant-baseline=\'middle\' font-size=\'28\'>🍳</text></svg>'">
          <div class="food-card-body">
            <div class="food-card-name">${food.name}</div>
            <div class="food-tags">
              <span class="tag tag-price">💰 ${price.toLocaleString()}G</span>
              <span class="tag ${profit >= 0 ? 'tag-profit-pos' : 'tag-profit-neg'}">
                利益 ${profit >= 0 ? '+' : ''}${profit.toLocaleString()}G
              </span>
              ${food.time > 0 && isFinite(hourly)
                ? `<span class="tag">⏱ 時給${hourly.toLocaleString()}G</span>` : ''}
              <span class="tag">🕐 ${formatTime(food.time)}</span>
            </div>
          </div>
          <div class="lv-badge" style="background:${lvColor(food.level)}">Lv.${food.level}</div>
          <div class="arrow ${isOpen ? 'open' : ''}">▼</div>
        </div>

        <div class="food-detail ${isOpen ? '' : 'hidden'}">
          <div>
            <div class="detail-section-title">📊 各★での売価・利益</div>
            <div class="star-grid">${allPricesHtml}</div>
          </div>
          <div>
            <div class="detail-section-title">🧂 材料</div>
            <div class="materials-grid">${materialsHtml}</div>
            ${food.cost > 0
              ? `<div class="cost-note">材料費合計：${food.cost.toLocaleString()}G</div>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ---- 詳細トグル ----
  window.toggleDetail = function(id) {
    openId = openId === id ? null : id;
    render();
    if (openId) {
      setTimeout(() => {
        const el = document.getElementById(`fc-${id}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 40);
    }
  };

  // ---- ★ ----
  window.setFoodStar = function(star) {
    starFilter = star;
    document.querySelectorAll('[data-star]').forEach(b =>
      b.classList.toggle('star-active', +b.dataset.star === star));
    render();
  };

  // ---- ソート ----
  window.setFoodSort = function(type) {
    sortType = type;
    document.querySelectorAll('[data-sort]').forEach(b =>
      b.classList.toggle('sort-active', b.dataset.sort === type));
    render();
  };

  // ---- レベル ----
  window.setFoodLevel = function(lv) {
    levelFilter = lv;
    document.querySelectorAll('[data-level]').forEach(b =>
      b.classList.toggle('level-active', +b.dataset.level === lv));
    render();
  };

  // ---- 検索 ----
  document.getElementById('foodSearchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });
  document.getElementById('foodSearchClear').addEventListener('click', () => {
    searchQuery = '';
    document.getElementById('foodSearchInput').value = '';
    render();
  });

  // ---- 比較セレクト初期化 ----
  function buildSelects() {
    const opts = FOODS.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
    document.getElementById('foodSelectA').innerHTML = opts;
    document.getElementById('foodSelectB').innerHTML = opts;
    if (FOODS.length > 1) document.getElementById('foodSelectB').selectedIndex = 1;
  }

  // ---- 比較 ----
  window.compareFoods = function() {
    const idA = +document.getElementById('foodSelectA').value;
    const idB = +document.getElementById('foodSelectB').value;
    const fA = FOODS.find(f => f.id === idA);
    const fB = FOODS.find(f => f.id === idB);
    if (!fA || !fB) return;

    const prA = getPrice(fA), prB = getPrice(fB);
    const pfA = prA - fA.cost, pfB = prB - fB.cost;
    const hrA = getHourly(fA), hrB = getHourly(fB);
    const pfWin = pfA >= pfB ? fA.name : fB.name;
    const hrWin = hrA >= hrB ? fA.name : fB.name;

    document.getElementById('foodCompareResult').innerHTML = `
      <div class="compare-result">
        <div class="compare-col">
          <strong>${fA.name}</strong><br>
          売価: ${prA.toLocaleString()}G<br>
          利益: <span class="${pfA>=0?'pos':'neg'}">${pfA>=0?'+':''}${pfA.toLocaleString()}G</span><br>
          時給: ${isFinite(hrA) ? hrA.toLocaleString()+'G' : '―'}
        </div>
        <div class="compare-vs">VS</div>
        <div class="compare-col">
          <strong>${fB.name}</strong><br>
          売価: ${prB.toLocaleString()}G<br>
          利益: <span class="${pfB>=0?'pos':'neg'}">${pfB>=0?'+':''}${pfB.toLocaleString()}G</span><br>
          時給: ${isFinite(hrB) ? hrB.toLocaleString()+'G' : '―'}
        </div>
      </div>
      <div class="compare-winner">
        🏆 利益：<strong>${pfWin}</strong>　⏱ 時給：<strong>${hrWin}</strong>
      </div>`;
  };

  // ---- ダークモード ----
  (function() {
    const saved = localStorage.getItem('theme') || 'light';
    if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').textContent = saved === 'dark' ? '☀️' : '🌙';
  })();

  document.getElementById('themeToggle').addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  });

  // ---- 初期化 ----
  buildSelects();
  render();
})();
</script>

</body>
</html>
