</div>

<div id="foodToast"></div>

<script src="js/i18n.js"></script>
<script src="js/data-foods.js"></script>
<script src="js/food-auth-calc.js"></script>
<script>

// ── ダークモード ──
const darkToggle = document.getElementById("darkToggle");
const savedDark = localStorage.getItem("darkMode");
if(savedDark === "true") document.body.classList.add("dark");
else if(savedDark === null && window.matchMedia("(prefers-color-scheme: dark)").matches)
  document.body.classList.add("dark");

// ボタン
darkToggle.onclick = ()=>{
  // 切替
  document.body.classList.toggle("dark");
  // 保存
  localStorage.setItem(
    "darkMode",
    document.body.classList.contains("dark")
  );
  // ボタン更新
  updateDarkButton();
  // Safari再描画対策
  forceRepaint();
};

// ボタン表示
function updateDarkButton(){

  darkToggle.textContent =
    document.body.classList.contains("dark")
    ? "☀️"
    : "🌙";
}

function forceRepaint(){
  // Safari/iPad再描画バグ対策
  document.body.style.display = "none";
  // 強制reflow
  document.body.offsetHeight;
  document.body.style.display = "";
}

// ── データ ──
let checkedData = JSON.parse(localStorage.getItem("food_checked") || "{}");
let authData    = JSON.parse(localStorage.getItem("food_auth") || "{}");

// ── 多言語表示ヘルパー ──
function currentLang(){
  return (window.i18n && typeof window.i18n.getCurrentLang === "function")
    ? window.i18n.getCurrentLang()
    : "ja";
}
function displayName(f){
  if(!f.nameI18n) return f.name;
  const lang = currentLang();
  return f.nameI18n[lang] || f.name;
}
function T(key, fallback, vars){
  if(window.i18n && typeof window.i18n.isReady === "function" && window.i18n.isReady()){
    return window.i18n.t(key, vars);
  }
  return fallback;
}

// ── 状態 ──
let currentSort        = "book";
let currentModalRarity = 1;
let currentModalFood   = null;

// ── 画像プリロード（IntersectionObserver方式） ──
const foodImgObserver = new IntersectionObserver((entries, obs) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      const f = entry.target._food;
      if(f.materials_image){
        f.materials_image.forEach(m => {
          if(m.image){
            const img = new Image();
            img.src = m.image;
          }
        });
      }
      obs.unobserve(entry.target);
    }
  });
}, { rootMargin: "300px" });

// ── 検索 ──
const searchInput = document.getElementById("search");
const clearBtn    = document.getElementById("clearBtn");

searchInput.addEventListener("input", ()=>{
  clearBtn.style.display = searchInput.value ? "block" : "none";
  render();
});

clearBtn.onclick = ()=>{
  searchInput.value = "";
  clearBtn.style.display = "none";
  render();
};

// ── 並び替え ──
function setSort(type){
  currentSort = type;
  ["book","level","unchecked","unauth"].forEach(x=>{
    document.getElementById("s_"+x).classList.toggle("active", x === type);
  });
  render();
}

// ── レア度インデックス ──
function rarityIdx(r){ return r - 1; }

// ── セクション描画 ──
// type: "normal" | "season" | "season_ended" | "fes" | "fes_ended"
function renderSection(items, type = "normal"){
  const frag = document.createDocumentFragment();

  // 見出し
  if(type === "season" || type === "season_ended"){

    const lbl = document.createElement("div");
    lbl.className = "f-section-label";
    lbl.textContent = T("food_section_season","🌸 シーズン料理");
    frag.appendChild(lbl);

    const banner = document.createElement("div");
    banner.className = "f-event-banner";
    banner.textContent =
      type === "season"
      ? T("food_banner_season_active","📍 現在開催中のシーズン")
      : T("food_banner_season_ended","⚠️ 現在このシーズンは終了しています");

    frag.appendChild(banner);

  }else if(type === "fes" || type === "fes_ended"){

    const lbl = document.createElement("div");
    lbl.className = "f-section-label";
    lbl.textContent = T("food_section_fes","🎉 フェス料理");
    frag.appendChild(lbl);

    const banner = document.createElement("div");
    banner.className = "f-event-banner";
    banner.textContent =
      type === "fes"
      ? T("food_banner_fes_active","📍 現在開催中のフェス")
      : T("food_banner_fes_ended","⚠️ 現在このフェスは終了しています");

    frag.appendChild(banner);
  }

  // グリッド
  const grid = document.createElement("div");
  grid.className = "grid";

  items.forEach(f => {

    const div = document.createElement("div");
    div.className = "item";

    const checked = !!checkedData[f.name];
    const authed  = !!authData[f.name];

    div.innerHTML = `
      <div class="img-wrap">
        ${f.level != null ? `<div class="level-badge">Lv.${f.level}</div>` : ''}
        <button class="check-btn ${checked ? "checked" : ""}">
          ${checked ? "⭐️" : ""}
        </button>
        ${f.auth !== false ? `
          <button class="auth-btn ${authed ? "checked" : ""}">
            ${authed ? "🎖" : ""}
          </button>
        ` : ''}
        <img src="${f.image}" alt="${displayName(f)}" loading="lazy">
      </div>
      <div class="item-name">${displayName(f)}</div>
    `;

    div._food = f;
    foodImgObserver.observe(div);   // ★追加
    
    div.onclick = () => openModal(f);

    div.querySelector(".check-btn").onclick = (e)=>{
      e.stopPropagation();
      checkedData[f.name] = !checkedData[f.name];
      localStorage.setItem("food_checked", JSON.stringify(checkedData));
      render();
    };

    const authBtn = div.querySelector(".auth-btn");
    if(authBtn){
      authBtn.onclick = (e)=>{
        e.stopPropagation();
        authData[f.name] = !authData[f.name];
        localStorage.setItem("food_auth", JSON.stringify(authData));
        render();
      };
    }

    grid.appendChild(div);
  });

  frag.appendChild(grid);

  return frag;
}

// ── 描画 ──
function render(){
  const keyword = searchInput.value.trim();
  const el = document.getElementById("list");
  el.innerHTML = "";

  // ★ 通常・シーズン・フェスに分離
  let normalList = foodsData.filter(f => !f.season && !f.fes);
  let seasonActiveList = foodsData.filter(f => f.season && !f.ended);
  let seasonEndedList  = foodsData.filter(f => f.season && f.ended);
  let fesActiveList    = foodsData.filter(f => f.fes && !f.ended);
  let fesEndedList     = foodsData.filter(f => f.fes && f.ended);

  // キーワード検索
  const filterByKeyword = (list) => list.filter(f => {
    if(!keyword) return true;
    const kw = keyword.toLowerCase();
    return f.name.toLowerCase().includes(kw) ||
      displayName(f).toLowerCase().includes(kw) ||
      (f.materials && f.materials.some(m => m.includes(keyword)));
  });

  normalList = filterByKeyword(normalList);
  seasonActiveList = filterByKeyword(seasonActiveList);
  seasonEndedList  = filterByKeyword(seasonEndedList);
  fesActiveList    = filterByKeyword(fesActiveList);
  fesEndedList     = filterByKeyword(fesEndedList);

  // 並び替え（通常のみ。シーズン・フェスは図鑑順固定）
  const sortList = (list) => {
    if(currentSort === "level"){
      return list.slice().sort((a,b) => (a.level||99) - (b.level||99));
    } else if(currentSort === "unchecked"){
      return list.slice().sort((a,b) => {
        const ac = checkedData[a.name] ? 1 : 0;
        const bc = checkedData[b.name] ? 1 : 0;
        if(ac !== bc) return ac - bc;
        return foodsData.indexOf(a) - foodsData.indexOf(b);
      });
    } else if(currentSort === "unauth"){
      return list.slice().sort((a,b) => {
        const ae = a.auth !== false ? 0 : 1;
        const be = b.auth !== false ? 0 : 1;
        if(ae !== be) return ae - be;
        const aa = authData[a.name] ? 1 : 0;
        const ba = authData[b.name] ? 1 : 0;
        if(aa !== ba) return aa - ba;
        return foodsData.indexOf(a) - foodsData.indexOf(b);
      });
    }
    return list;
  };

  normalList = sortList(normalList);

  if(normalList.length === 0 && seasonActiveList.length === 0 && seasonEndedList.length === 0 &&
   fesActiveList.length === 0 && fesEndedList.length === 0){
  el.innerHTML = `<p style="text-align:center;color:var(--text-sub);padding:40px 0;">${T("food_no_results","該当なし")}</p>`;
  return;
}


  if(normalList.length > 0) el.appendChild(renderSection(normalList, "normal"));
  if(seasonActiveList.length > 0) el.appendChild(renderSection(seasonActiveList, "season"));
  if(seasonEndedList.length > 0) el.appendChild(renderSection(seasonEndedList, "season_ended"));
  if(fesActiveList.length > 0) el.appendChild(renderSection(fesActiveList, "fes"));
  if(fesEndedList.length > 0) el.appendChild(renderSection(fesEndedList, "fes_ended"));
}

// ── モーダル ──
function openModal(f){
  currentModalFood = f;
  currentModalRarity = 1;
  if(f.rarity){
    for(let i=0;i<5;i++){
      if(f.rarity[i]){ currentModalRarity = i+1; break; }
    }
  }
  renderModal();
  document.getElementById("foodModal").style.display = "block";
}

function closeModal(){
  document.getElementById("foodModal").style.display = "none";
  currentModalFood = null;
}

function setModalRarity(r){
  currentModalRarity = r;
  renderModal();
}

function renderModal(){
  const f = currentModalFood;
  if(!f) return;
  const box = document.getElementById("modalBox");
  const r = currentModalRarity;
  const idx = rarityIdx(r);

  const price = f.prices && f.prices[idx] != null ? f.prices[idx] : null;
  const profit = price != null ? price - (f.cost || 0) : null;
  const profitClass = profit == null ? "" : profit >= 0 ? "profit-plus" : "profit-minus";
  const profitText = profit == null ? T("food_unknown","不明") :
    (profit >= 0 ? `+${profit.toLocaleString()}` : `${profit.toLocaleString()}`);

  const rarityTabs = [1,2,3,4,5].map(rv => {
    const available = f.rarity && f.rarity[rv-1];
    return `<button
      class="f-rarity-tab ${rv === r ? "active" : ""} ${!available ? "disabled" : ""}"
      onclick="setModalRarity(${rv})">☆${rv}</button>`;
  }).join("");

  let materialsHTML = "";
  if(f.materials_image && f.materials_image.length > 0){
    const validItems = f.materials_image
      .map((m, i) => ({ img: m.image, label: f.materials && f.materials[i] ? f.materials[i] : "" }))
      .filter(item => item.img && item.label);

    if(validItems.length > 0){
      const itemsHTML = validItems.map(item => `
        <div class="f-material-item">
          <img class="f-material-img" src="${item.img}" alt="${item.label}" loading="lazy"
            onerror="this.style.display='none'">
          <div class="f-material-name">${item.label}</div>
        </div>
      `).join("");
      materialsHTML = `
        <div class="f-section-title">🥕 ${T("food_materials","素材")}</div>
        <div class="f-materials">${itemsHTML}</div>
      `;
    }
  } else if(f.materials && f.materials.length > 0){
    const lines = f.materials.filter(m => m).map(m => `<div>・${m}</div>`).join("");
    if(lines){
      materialsHTML = `
        <div class="f-section-title">🥕 ${T("food_materials","素材")}</div>
        <div class="f-material-text">${lines}</div>
      `;
    }
  }

  box.innerHTML = `
    <div class="f-modal-name">${displayName(f)}</div>
    <img class="f-modal-img" src="${f.image}" alt="${displayName(f)}">

    <div class="f-rarity-tabs">${rarityTabs}</div>

    <div class="f-price-card">
      <div class="f-info-row">
        <span class="f-info-label">${T("food_price","売価")}</span>
        <span class="f-info-value">${price != null ? price.toLocaleString() + " " + T("food_coin","コイン") : T("food_unknown","不明")}</span>
      </div>
      <div class="f-info-row">
        <span class="f-info-label">${T("food_cost","材料費")}</span>
        <span class="f-info-value">${(f.cost || 0).toLocaleString()} ${T("food_coin","コイン")}</span>
      </div>
      <div class="f-info-row">
        <span class="f-info-label">${T("food_profit","利益")}</span>
        <span class="f-info-value ${profitClass}">${profitText} ${T("food_coin","コイン")}</span>
      </div>
    </div>

    <div class="f-info" style="margin-bottom:12px;">
      <div class="f-info-row">
        <span class="f-info-label">${T("food_time","調理時間")}</span>
        <span class="f-info-value">${formatTime(f.time)}</span>
      </div>
      ${f.level != null ? `
      <div class="f-info-row">
        <span class="f-info-label">${T("food_level","レベル")}</span>
        <span class="f-info-value">Lv.${f.level}</span>
      </div>` : ""}
    </div>

    ${materialsHTML}

    <button class="f-close-btn" onclick="closeModal()">${T("food_close","閉じる")}</button>
  `;
}

// ── 時間フォーマット ──
function formatTime(min){
  if(!min || min === 0) return T("food_instant","即時");
  const minLabel = T("food_min","分");
  const hourLabel = T("food_hour","時間");
  const lang = currentLang();
  const sep = lang === "en" ? " " : "";
  if(min < 60) return `${min}${sep}${minLabel}`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  if(m === 0) return `${h}${sep}${hourLabel}`;
  return `${h}${sep}${hourLabel} ${m}${sep}${minLabel}`;
}

// ── トースト ──
function showToast(msg){
  const t = document.getElementById("foodToast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"), 2500);
}

// ══════════════════════════════════════
// 認証マスター計算ツール
// ══════════════════════════════════════
const calcOpenBtn   = document.getElementById("calcOpenBtn");
const calcModal     = document.getElementById("calcModal");
const calcModalBody = document.getElementById("calcModalBody");

calcOpenBtn.onclick = () => {
  renderCalcModal();
  calcModal.style.display = "block";
};

function closeCalcModal(){
  calcModal.style.display = "none";
}

function renderCalcModal(){
  const targets = getAuthTargetFoods();
  const state = loadCalcState();

  if(targets.length === 0){
    calcModalBody.innerHTML = `
      <div class="calc-no-target-note">${T("food_calc_no_target","現在、認証マスターの目標数が設定されている料理がありません。")}</div>
    `;
    return;
  }

  // 選択中の料理を決定（保存済み優先、なければ先頭）
  let selectedName = state.foodName;
  let selectedFood = targets.find(f => f.name === selectedName);
  if(!selectedFood){
    selectedFood = targets[0];
    selectedName = selectedFood.name;
  }

  const madeCount = (state.foodName === selectedName && state.madeCount != null) ? state.madeCount : 0;

  const options = targets.map(f =>
    `<option value="${f.name}" ${f.name === selectedName ? "selected" : ""}>${displayName(f)}</option>`
  ).join("");

  calcModalBody.innerHTML = `
    <div class="calc-field-label">${T("food_calc_select_label","料理")}</div>
    <select class="calc-select" id="calcFoodSelect">${options}</select>

    <div class="calc-field-label">${T("food_calc_made_label","現在作成済み")}</div>
    <div class="calc-input-row">
      <input type="number" min="0" class="calc-input" id="calcMadeInput" value="${madeCount}">
    </div>

    <div id="calcResultArea"></div>

    <button class="f-close-btn" onclick="closeCalcModal()">${T("food_close","閉じる")}</button>
  `;

  document.getElementById("calcFoodSelect").addEventListener("change", (e)=>{
    saveCalcState({ foodName: e.target.value, madeCount: 0 });
    renderCalcModal();
  });

  document.getElementById("calcMadeInput").addEventListener("input", (e)=>{
    const val = parseInt(e.target.value, 10) || 0;
    saveCalcState({ foodName: selectedName, madeCount: val });
    renderCalcResult(selectedFood, val);
  });

  renderCalcResult(selectedFood, madeCount);
}

function renderCalcResult(food, madeCount){
  const area = document.getElementById("calcResultArea");
  if(!area) return;

  const result = calcAuthProgress(food, madeCount);

  const progressHTML = `
    <div class="calc-divider"></div>
    <div class="calc-progress-card">
      <div class="calc-progress-row">
        <div class="calc-progress-item">
          <div class="calc-progress-label">${T("food_calc_target_label","認証マスター")}</div>
          <div class="calc-progress-value">${result.target.toLocaleString()}<span class="calc-progress-unit">${T("food_calc_dish_unit","皿")}</span></div>
        </div>
        <div class="calc-progress-item">
          <div class="calc-progress-label">${T("food_calc_remaining_label","残り")}</div>
          <div class="calc-progress-value highlight">${result.remaining.toLocaleString()}<span class="calc-progress-unit">${T("food_calc_dish_unit","皿")}</span></div>
        </div>
      </div>
    </div>
  `;

  if(result.materials.length === 0){
    area.innerHTML = progressHTML + `
      <div class="calc-empty-note">${T("food_calc_no_materials","この料理には計算対象の素材がありません。")}</div>
    `;
    return;
  }

  const materialInputsHTML = result.materials.map(m => `
    <div class="calc-material-item">
      ${m.image ? `<img class="calc-material-img" src="${m.image}" alt="${m.name}" onerror="this.style.display='none'">` : `<div class="calc-material-img"></div>`}
      <div class="calc-material-info">
        <div class="calc-material-name">${m.name}</div>
      </div>
      <input type="number" min="0" class="calc-material-input"
        data-material-key="${encodeURIComponent(m.key)}"
        value="${m.have}">
    </div>
  `).join("");

  area.innerHTML = progressHTML + `
    <div class="calc-material-section-title">${T("food_calc_inventory_title","所持素材数")}</div>
    ${materialInputsHTML}

    <div class="calc-shortage-section">
      <div class="calc-material-section-title">${T("food_calc_shortage_title","不足素材")}</div>
      <div id="calcShortageList"></div>
    </div>
  `;

  // 所持数入力イベント（グローバル在庫に保存 → 不足素材セクションのみ再計算）
  area.querySelectorAll(".calc-material-input").forEach(input => {
    input.addEventListener("input", (e)=>{
      const key = decodeURIComponent(e.target.dataset.materialKey);
      const val = parseInt(e.target.value, 10) || 0;
      setInventoryQty(key, val);
      refreshShortageList(food);
    });
  });

  refreshShortageList(food);
}

// ── 不足素材セクションの描画（トップレベル素材＋分解パーツ） ──
function refreshShortageList(food){
  const listEl = document.getElementById("calcShortageList");
  if(!listEl) return;

  const madeInput = document.getElementById("calcMadeInput");
  const made = madeInput ? (parseInt(madeInput.value, 10) || 0) : 0;
  const result = calcAuthProgress(food, made);

  listEl.innerHTML = result.materials.map(m => renderShortageItemHTML(food, m)).join("");
  bindShortageEvents(food, listEl);
}

// 1つの素材（トップレベル）の不足表示HTML（分解トグル・分解結果込み）
function renderShortageItemHTML(food, m){
  const enough = m.short <= 0;

  const toggleHTML = m.breakdownAvailable ? `
    <label class="calc-breakdown-toggle">
      <input type="checkbox" class="calc-breakdown-checkbox"
        data-material-key="${encodeURIComponent(m.key)}"
        ${m.breakdownOn ? "checked" : ""}>
      <span>${T("food_calc_breakdown_label","分解して計算")}</span>
    </label>
  ` : "";

  let breakdownHTML = "";
  if(m.breakdownOn && m.breakdown){
    if(m.breakdown.isFreeform){
      breakdownHTML = renderFreeformBreakdownHTML(food, m);
    } else if(m.breakdown.parts.length > 0){
      breakdownHTML = renderRecipeBreakdownHTML(m);
    } else {
      breakdownHTML = `<div class="calc-breakdown-empty">${T("food_calc_breakdown_no_recipe","レシピが見つかりませんでした")}</div>`;
    }
  }

  return `
    <div class="calc-shortage-item-wrap">
      <div class="calc-shortage-item ${enough ? "enough" : ""}">
        ${m.image ? `<img class="calc-shortage-img" src="${m.image}" alt="${m.name}" onerror="this.style.display='none'">` : `<div class="calc-shortage-img"></div>`}
        <div class="calc-shortage-info">
          <div class="calc-shortage-name">${m.name}</div>
          <div class="calc-shortage-detail">
            <span>${T("food_calc_need_label","必要")}${m.need.toLocaleString()}</span>
            <span>${T("food_calc_have_label","所持")}${m.have.toLocaleString()}</span>
          </div>
        </div>
        ${enough
          ? `<span class="calc-shortage-enough-tag">${T("food_calc_enough_label","充足")}</span>`
          : `<span class="calc-shortage-need">${T("food_calc_short_label","あと")}${m.short.toLocaleString()}</span>`}
      </div>
      ${toggleHTML}
      ${breakdownHTML}
    </div>
  `;
}

// 実在レシピによる自動分解のHTML
function renderRecipeBreakdownHTML(m){
  const rows = m.breakdown.parts.map(p => {
    const enough = p.short <= 0;
    return `
      <div class="calc-breakdown-item ${enough ? "enough" : ""}">
        ${p.image ? `<img class="calc-breakdown-img" src="${p.image}" alt="${p.name}" onerror="this.style.display='none'">` : `<div class="calc-breakdown-img"></div>`}
        <div class="calc-breakdown-info">
          <div class="calc-breakdown-name">${p.name}</div>
          <div class="calc-breakdown-detail">
            <span>${T("food_calc_need_label","必要")}${p.need.toLocaleString()}</span>
            <span>${T("food_calc_have_label","所持")}${p.have.toLocaleString()}</span>
          </div>
        </div>
        ${enough
          ? `<span class="calc-shortage-enough-tag">${T("food_calc_enough_label","充足")}</span>`
          : `<span class="calc-shortage-need">${T("food_calc_short_label","あと")}${p.short.toLocaleString()}</span>`}
      </div>
    `;
  }).join("");

  return `<div class="calc-breakdown-box">${rows}</div>`;
}

// 「なんでもOK」系の自由入力分解HTML
function renderFreeformBreakdownHTML(food, m){
  const parts = m.breakdown.parts;

  const rows = parts.map(p => `
    <div class="calc-freeform-item" data-freeform-index="${p.index}">
      <input type="text" class="calc-freeform-name" placeholder="${T("food_calc_freeform_name_placeholder","素材名")}"
        data-material-key="${encodeURIComponent(m.key)}" data-field="name" value="${p.name}">
      <input type="number" min="0" class="calc-freeform-qty" placeholder="${T("food_calc_freeform_qty_placeholder","個数/1皿")}"
        data-material-key="${encodeURIComponent(m.key)}" data-field="qty" value="${p.qty}">
      <input type="number" min="0" class="calc-freeform-have" placeholder="${T("food_calc_freeform_have_placeholder","所持")}"
        data-material-key="${encodeURIComponent(m.key)}" data-field="have" value="${p.have}">
      <button type="button" class="calc-freeform-remove" data-material-key="${encodeURIComponent(m.key)}" data-remove-index="${p.index}">✕</button>
    </div>
  `).join("");

  return `
    <div class="calc-breakdown-box calc-freeform-box">
      ${rows}
      <button type="button" class="calc-freeform-add" data-material-key="${encodeURIComponent(m.key)}">
        ＋ ${T("food_calc_freeform_add","素材を追加")}
      </button>
    </div>
  `;
}

// 不足素材リスト内のイベントを束ねてバインド（トグル・分解入力・追加削除）
function bindShortageEvents(food, listEl){
  // 分解トグル
  listEl.querySelectorAll(".calc-breakdown-checkbox").forEach(cb => {
    cb.addEventListener("change", (e)=>{
      const key = decodeURIComponent(e.target.dataset.materialKey);
      setBreakdownOn(food.name, key, e.target.checked);
      refreshShortageList(food);
    });
  });

  // なんでもOK系：自由入力の値変更
  listEl.querySelectorAll(".calc-freeform-name, .calc-freeform-qty, .calc-freeform-have").forEach(input => {
    input.addEventListener("input", (e)=>{
      const key   = decodeURIComponent(e.target.dataset.materialKey);
      const field = e.target.dataset.field;
      const wrap  = e.target.closest(".calc-freeform-item");
      const index = parseInt(wrap.dataset.freeformIndex, 10);

      const parts = getFreeformParts(food.name, key);
      if(!parts[index]) parts[index] = { name: "", qty: 0, have: 0 };

      if(field === "name") parts[index].name = e.target.value;
      if(field === "qty")  parts[index].qty  = parseInt(e.target.value, 10) || 0;
      if(field === "have") parts[index].have = parseInt(e.target.value, 10) || 0;

      setFreeformParts(food.name, key, parts);

      // 数値変更時のみ即時再計算（テキスト入力中のフォーカス維持のため、name入力時は再描画しない）
      if(field !== "name"){
        refreshShortageList(food);
      }
    });
  });

  // なんでもOK系：素材追加ボタン
  listEl.querySelectorAll(".calc-freeform-add").forEach(btn => {
    btn.addEventListener("click", (e)=>{
      const key = decodeURIComponent(e.target.dataset.materialKey);
      const parts = getFreeformParts(food.name, key);
      parts.push({ name: "", qty: 0, have: 0 });
      setFreeformParts(food.name, key, parts);
      refreshShortageList(food);
    });
  });

  // なんでもOK系：素材削除ボタン
  listEl.querySelectorAll(".calc-freeform-remove").forEach(btn => {
    btn.addEventListener("click", (e)=>{
      const key = decodeURIComponent(e.target.dataset.materialKey);
      const idx = parseInt(e.target.dataset.removeIndex, 10);
      const parts = getFreeformParts(food.name, key);
      parts.splice(idx, 1);
      setFreeformParts(food.name, key, parts);
      refreshShortageList(food);
    });
  });
}

// 初期化
render();

// 言語切替時に再描画
document.addEventListener("langchange", ()=>{
  render();
  if(currentModalFood) renderModal();
  if(calcModal.style.display === "block") renderCalcModal();
});

</script>
